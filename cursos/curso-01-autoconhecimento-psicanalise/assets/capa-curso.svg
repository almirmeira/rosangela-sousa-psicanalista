<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <!-- Fundo creme -->
  <rect width="800" height="600" fill="#F4E9CD"/>

  <!-- Borda decorativa externa -->
  <rect x="16" y="16" width="768" height="568" rx="18" ry="18" fill="none" stroke="#2D6A4F" stroke-width="3"/>
  <rect x="24" y="24" width="752" height="552" rx="14" ry="14" fill="none" stroke="#D4A373" stroke-width="1.5"/>

  <!-- Cabeçalho verde -->
  <rect x="0" y="0" width="800" height="130" rx="18" ry="18" fill="#2D6A4F"/>
  <rect x="0" y="112" width="800" height="20" fill="#2D6A4F"/>

  <!-- Título do curso -->
  <text x="400" y="52" text-anchor="middle" font-size="15" fill="#D4A373" font-family="Georgia, serif" letter-spacing="4">CURSO 1</text>
  <text x="400" y="85" text-anchor="middle" font-size="28" fill="#F4E9CD" font-weight="bold" font-family="Georgia, serif">Autoconhecimento pela Psicanálise</text>
  <text x="400" y="110" text-anchor="middle" font-size="13" fill="#D4A373" letter-spacing="2">com Rosangela Sousa • Psicanalista &amp; Terapeuta Holística</text>

  <!-- Ícone central — espiral do inconsciente -->
  <circle cx="400" cy="230" r="72" fill="none" stroke="#2D6A4F" stroke-width="3"/>
  <circle cx="400" cy="230" r="54" fill="none" stroke="#D4A373" stroke-width="2"/>
  <circle cx="400" cy="230" r="36" fill="none" stroke="#2D6A4F" stroke-width="2"/>
  <circle cx="400" cy="230" r="18" fill="#2D6A4F" opacity="0.15"/>
  <circle cx="400" cy="230" r="8" fill="#D4A373"/>
  <!-- Linhas radiais -->
  <line x1="400" y1="158" x2="400" y2="175" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="400" y1="285" x2="400" y2="302" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="328" y1="230" x2="345" y2="230" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="455" y1="230" x2="472" y2="230" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="349" y1="179" x2="361" y2="191" stroke="#D4A373" stroke-width="2"/>
  <line x1="439" y1="269" x2="451" y2="281" stroke="#D4A373" stroke-width="2"/>
  <line x1="349" y1="281" x2="361" y2="269" stroke="#D4A373" stroke-width="2"/>
  <line x1="439" y1="191" x2="451" y2="179" stroke="#D4A373" stroke-width="2"/>

  <!-- Texto central no ícone -->
  <text x="400" y="235" text-anchor="middle" font-size="11" fill="#2D6A4F" font-weight="bold">PSIQUE</text>

  <!-- Módulos — 4 cards abaixo -->
  <!-- Card Módulo 1 -->
  <rect x="44" y="330" width="155" height="90" rx="10" ry="10" fill="#2D6A4F" opacity="0.9"/>
  <text x="121" y="355" text-anchor="middle" font-size="10" fill="#D4A373" font-weight="bold" letter-spacing="1">MÓDULO 1</text>
  <text x="121" y="375" text-anchor="middle" font-size="12" fill="#F4E9CD" font-weight="bold">O Que É</text>
  <text x="121" y="392" text-anchor="middle" font-size="12" fill="#F4E9CD" font-weight="bold">Psicanálise?</text>
  <text x="121" y="410" text-anchor="middle" font-size="10" fill="#D4A373">2 horas • 6 aulas</text>

  <!-- Card Módulo 2 -->
  <rect x="215" y="330" width="155" height="90" rx="10" ry="10" fill="#D4A373" opacity="0.9"/>
  <text x="292" y="355" text-anchor="middle" font-size="10" fill="#2D6A4F" font-weight="bold" letter-spacing="1">MÓDULO 2</text>
  <text x="292" y="375" text-anchor="middle" font-size="12" fill="#2D6A4F" font-weight="bold">Estruturas</text>
  <text x="292" y="392" text-anchor="middle" font-size="12" fill="#2D6A4F" font-weight="bold">da Psique</text>
  <text x="292" y="410" text-anchor="middle" font-size="10" fill="#2D6A4F">2 horas • 6 aulas</text>

  <!-- Card Módulo 3 -->
  <rect x="386" y="330" width="155" height="90" rx="10" ry="10" fill="#2D6A4F" opacity="0.9"/>
  <text x="463" y="355" text-anchor="middle" font-size="10" fill="#D4A373" font-weight="bold" letter-spacing="1">MÓDULO 3</text>
  <text x="463" y="375" text-anchor="middle" font-size="12" fill="#F4E9CD" font-weight="bold">O Inconsciente</text>
  <text x="463" y="392" text-anchor="middle" font-size="12" fill="#F4E9CD" font-weight="bold">em Ação</text>
  <text x="463" y="410" text-anchor="middle" font-size="10" fill="#D4A373">2 horas • 6 aulas</text>

  <!-- Card Módulo 4 -->
  <rect x="557" y="330" width="155" height="90" rx="10" ry="10" fill="#D4A373" opacity="0.9"/>
  <text x="634" y="355" text-anchor="middle" font-size="10" fill="#2D6A4F" font-weight="bold" letter-spacing="1">MÓDULO 4</text>
  <text x="634" y="375" text-anchor="middle" font-size="12" fill="#2D6A4F" font-weight="bold">Autoconhecimento</text>
  <text x="634" y="392" text-anchor="middle" font-size="12" fill="#2D6A4F" font-weight="bold">na Prática</text>
  <text x="634" y="410" text-anchor="middle" font-size="10" fill="#2D6A4F">2 horas • 6 aulas</text>

  <!-- Seta conectando módulos -->
  <line x1="199" y1="375" x2="215" y2="375" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="375" x2="386" y2="375" stroke="#C9A84C" stroke-width="2"/>
  <line x1="541" y1="375" x2="557" y2="375" stroke="#C9A84C" stroke-width="2"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C9A84C"/>
    </marker>
  </defs>

  <!-- Linha separadora -->
  <line x1="60" y1="445" x2="740" y2="445" stroke="#2D6A4F" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Info de carga horária e plataforma -->
  <text x="400" y="475" text-anchor="middle" font-size="13" fill="#2D6A4F" font-weight="bold">Carga Horária: 8 horas | 24 aulas + 4 exercícios</text>
  <text x="400" y="498" text-anchor="middle" font-size="12" fill="#6B4C2A">Nível: Iniciante | Plataforma: Educa com Talento (Moodle)</text>

  <!-- Ornamento floral mínimo inferior -->
  <circle cx="200" cy="540" r="5" fill="#D4A373" opacity="0.5"/>
  <circle cx="220" cy="535" r="3" fill="#2D6A4F" opacity="0.4"/>
  <circle cx="580" cy="540" r="5" fill="#D4A373" opacity="0.5"/>
  <circle cx="600" cy="535" r="3" fill="#2D6A4F" opacity="0.4"/>

  <!-- Tagline final -->
  <text x="400" y="545" text-anchor="middle" font-size="12" fill="#2D6A4F" font-style="italic">"Conhecer a si mesmo é o começo de toda a sabedoria." — Aristóteles</text>

  <!-- Rodapé -->
  <rect x="0" y="570" width="800" height="30" rx="0" ry="0" fill="#2D6A4F" opacity="0.85"/>
  <text x="400" y="589" text-anchor="middle" font-size="11" fill="#D4A373" letter-spacing="1">rosangela-sousa.com.br • @rosangela.sousa.psicanalista</text>
</svg>

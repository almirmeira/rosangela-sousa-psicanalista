<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bgBonus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD"/>
      <stop offset="100%" style="stop-color:#E8D5A8"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D6A4F"/>
      <stop offset="100%" style="stop-color:#1E4D3A"/>
    </linearGradient>
    <linearGradient id="jungGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A4B"/>
      <stop offset="100%" style="stop-color:#0D2230"/>
    </linearGradient>
    <filter id="sh5">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#00000030"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgBonus)"/>
  <rect x="15" y="15" width="870" height="570" rx="12" fill="none" stroke="#2D6A4F" stroke-width="1.5" opacity="0.4"/>

  <!-- Título -->
  <text x="450" y="48" font-family="Georgia, serif" font-size="23" fill="#1B3A4B" text-anchor="middle" font-weight="bold">Jung e a Neurociência — Pontes Entre Dois Mundos</text>
  <text x="450" y="68" font-family="Arial, sans-serif" font-size="13" fill="#2D6A4F" text-anchor="middle" font-style="italic">Módulo Bônus — Convergências entre Psicologia Analítica e Neurociências Modernas</text>
  <line x1="160" y1="78" x2="740" y2="78" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>

  <!-- Coluna JUNG (esquerda) -->
  <rect x="50" y="100" width="260" height="390" rx="12" fill="url(#jungGrad)" opacity="0.85" filter="url(#sh5)"/>
  <text x="180" y="128" font-family="Georgia, serif" font-size="16" fill="#F4E9CD" text-anchor="middle" font-weight="bold">JUNG</text>
  <text x="180" y="146" font-family="Arial, sans-serif" font-size="11" fill="#A0BFC8" text-anchor="middle">Psicologia Analítica (1912+)</text>
  <line x1="65" y1="155" x2="295" y2="155" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>

  <text x="70" y="178" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Inconsciente Coletivo</text>
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Arquétipos universais</text>
  <text x="70" y="222" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Complexos autônomos</text>
  <text x="70" y="244" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Simbolismo dos sonhos</text>
  <text x="70" y="266" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Processo de individuação</text>
  <text x="70" y="288" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Self como centro organizador</text>
  <text x="70" y="310" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Sincronicidade</text>
  <text x="70" y="332" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Tipos psicológicos</text>
  <text x="70" y="354" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Imaginação ativa</text>
  <text x="70" y="376" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Análise de sonhos</text>
  <text x="70" y="398" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Psique como sistema</text>
  <text x="70" y="420" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">  dinâmico autorregulado</text>
  <text x="70" y="445" font-family="Arial, sans-serif" font-size="9" fill="#A0BFC8" font-style="italic">Método: clínico-introspectivo</text>
  <text x="70" y="462" font-family="Arial, sans-serif" font-size="9" fill="#A0BFC8" font-style="italic">Base: observação, mitos, alquimia</text>

  <!-- Coluna NEUROCIÊNCIA (direita) -->
  <rect x="590" y="100" width="260" height="390" rx="12" fill="url(#brainGrad)" opacity="0.88" filter="url(#sh5)"/>
  <text x="720" y="128" font-family="Georgia, serif" font-size="16" fill="#F4E9CD" text-anchor="middle" font-weight="bold">NEUROCIÊNCIAS</text>
  <text x="720" y="146" font-family="Arial, sans-serif" font-size="11" fill="#A0D4B8" text-anchor="middle">Séc. XX-XXI</text>
  <line x1="605" y1="155" x2="835" y2="155" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>

  <text x="610" y="178" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Memória implícita (sistêmica)</text>
  <text x="610" y="200" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Padrões neurais herdados</text>
  <text x="610" y="222" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Redes neurais autônomas</text>
  <text x="610" y="244" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Processamento REM (sonhos)</text>
  <text x="610" y="266" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Desenvolvimento do córtex</text>
  <text x="610" y="288" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Rede de Modo Padrão (DMN)</text>
  <text x="610" y="310" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Neurônios-espelho</text>
  <text x="610" y="332" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Tipos de personalidade (Big 5)</text>
  <text x="610" y="354" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Visualização mental</text>
  <text x="610" y="376" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● fMRI dos sonhos</text>
  <text x="610" y="398" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">● Plasticidade neuronal</text>
  <text x="610" y="420" font-family="Arial, sans-serif" font-size="11" fill="#D4E8DD">  e autoregulação</text>
  <text x="610" y="445" font-family="Arial, sans-serif" font-size="9" fill="#A0D4B8" font-style="italic">Método: experimental-laboratorial</text>
  <text x="610" y="462" font-family="Arial, sans-serif" font-size="9" fill="#A0D4B8" font-style="italic">Base: neuroimagem, genética, fMRI</text>

  <!-- Coluna CONVERGÊNCIAS (centro) -->
  <rect x="330" y="100" width="240" height="390" rx="12" fill="#C9A84C" opacity="0.18" stroke="#C9A84C" stroke-width="2" filter="url(#sh5)"/>
  <text x="450" y="128" font-family="Georgia, serif" font-size="14" fill="#1B3A4B" text-anchor="middle" font-weight="bold">CONVERGÊNCIAS</text>
  <text x="450" y="145" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">Pontos de encontro</text>
  <line x1="340" y1="153" x2="560" y2="153" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>

  <text x="345" y="176" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Proc. inconsciente universal</text>
  <text x="345" y="197" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Padrões herdados de resposta</text>
  <text x="345" y="218" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Autonomia subsistemas</text>
  <text x="345" y="239" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Significado dos sonhos</text>
  <text x="345" y="260" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Integração ego-totalidade</text>
  <text x="345" y="281" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Narrativa e identidade</text>
  <text x="345" y="302" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Empatia e espelhamento</text>
  <text x="345" y="323" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Traços de personalidade</text>
  <text x="345" y="344" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Criação de imagens internas</text>
  <text x="345" y="365" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Atividade onírica</text>
  <text x="345" y="386" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B">↔ Mudança e neuroplast.</text>

  <line x1="340" y1="400" x2="560" y2="400" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>
  <text x="450" y="420" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-style="italic">100 anos antes da neuroci.,</text>
  <text x="450" y="437" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-style="italic">Jung já descrevia o que</text>
  <text x="450" y="454" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-style="italic">os laboratórios confirmam</text>
  <text x="450" y="476" font-family="Arial, sans-serif" font-size="13" fill="#C9A84C" text-anchor="middle" font-weight="bold">★ Pioneiro!</text>

  <!-- Rodapé -->
  <rect x="50" y="505" width="800" height="65" rx="8" fill="#1B3A4B" opacity="0.07"/>
  <text x="450" y="527" font-family="Georgia, serif" font-size="13" fill="#1B3A4B" text-anchor="middle" font-style="italic">"A psique é maior do que o que podemos medir, e a ciência está apenas começando</text>
  <text x="450" y="545" font-family="Georgia, serif" font-size="13" fill="#1B3A4B" text-anchor="middle" font-style="italic">a confirmar o que Jung descobriu através da escuta profunda da alma humana."</text>
  <text x="450" y="563" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" text-anchor="middle">— Rosangela Sousa</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <!-- Fundo gradiente creme -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EAD5B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D6A4F;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#1B3A4B;stop-opacity:0.25" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Ornamentos de fundo — círculos concêntricos suaves -->
  <circle cx="450" cy="300" r="260" fill="none" stroke="#2D6A4F" stroke-width="0.5" opacity="0.2"/>
  <circle cx="450" cy="300" r="220" fill="none" stroke="#2D6A4F" stroke-width="0.5" opacity="0.2"/>
  <circle cx="450" cy="300" r="180" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.25"/>
  <circle cx="450" cy="300" r="140" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.25"/>
  <circle cx="450" cy="300" r="100" fill="none" stroke="#D4A373" stroke-width="1" opacity="0.3"/>

  <!-- Glow central -->
  <circle cx="450" cy="300" r="200" fill="url(#centerGlow)"/>

  <!-- Mandala simplificada no centro -->
  <!-- Pétalas -->
  <ellipse cx="450" cy="220" rx="22" ry="55" fill="#2D6A4F" opacity="0.18"/>
  <ellipse cx="450" cy="380" rx="22" ry="55" fill="#2D6A4F" opacity="0.18"/>
  <ellipse cx="370" cy="300" rx="55" ry="22" fill="#2D6A4F" opacity="0.18"/>
  <ellipse cx="530" cy="300" rx="55" ry="22" fill="#2D6A4F" opacity="0.18"/>
  <ellipse cx="394" cy="244" rx="22" ry="55" transform="rotate(45 394 244)" fill="#D4A373" opacity="0.2"/>
  <ellipse cx="506" cy="244" rx="22" ry="55" transform="rotate(-45 506 244)" fill="#D4A373" opacity="0.2"/>
  <ellipse cx="394" cy="356" rx="22" ry="55" transform="rotate(-45 394 356)" fill="#D4A373" opacity="0.2"/>
  <ellipse cx="506" cy="356" rx="22" ry="55" transform="rotate(45 506 356)" fill="#D4A373" opacity="0.2"/>

  <!-- Círculo central da mandala -->
  <circle cx="450" cy="300" r="52" fill="#F4E9CD" stroke="#C9A84C" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="450" cy="300" r="42" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>

  <!-- Símbolo no centro — yin-yang estilizado (Self junguiano) -->
  <circle cx="450" cy="300" r="30" fill="#2D6A4F" opacity="0.85"/>
  <text x="450" y="308" font-family="Georgia, serif" font-size="26" fill="#F4E9CD" text-anchor="middle" font-weight="bold">ψ</text>

  <!-- Bordas decorativas -->
  <rect x="30" y="30" width="840" height="540" rx="18" fill="none" stroke="#2D6A4F" stroke-width="2" opacity="0.35"/>
  <rect x="38" y="38" width="824" height="524" rx="14" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>

  <!-- Cantos decorativos -->
  <path d="M 60 60 Q 50 50 40 60" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 60 60 Q 50 50 60 40" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 840 60 Q 850 50 860 60" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 840 60 Q 850 50 840 40" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 60 540 Q 50 550 40 540" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 60 540 Q 50 550 60 560" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 840 540 Q 850 550 860 540" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 840 540 Q 850 550 840 560" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Título principal -->
  <text x="450" y="110" font-family="Georgia, serif" font-size="38" fill="#1B3A4B" text-anchor="middle" font-weight="bold" filter="url(#shadow)">Jung e os Arquétipos</text>
  <text x="450" y="148" font-family="Georgia, serif" font-size="22" fill="#2D6A4F" text-anchor="middle" font-style="italic">Conheça Sua Psique</text>

  <!-- Linha decorativa abaixo do título -->
  <line x1="250" y1="162" x2="650" y2="162" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
  <circle cx="450" cy="162" r="4" fill="#C9A84C" opacity="0.8"/>

  <!-- Informações do curso abaixo da mandala -->
  <!-- Box de módulos -->
  <rect x="80" y="395" width="340" height="155" rx="10" fill="#2D6A4F" opacity="0.08" stroke="#2D6A4F" stroke-width="1" opacity="0.25"/>

  <text x="100" y="420" font-family="Arial, sans-serif" font-size="11" fill="#1B3A4B" font-weight="bold" opacity="0.85">MÓDULOS</text>
  <text x="100" y="440" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">◆  Jung: Um Novo Olhar Sobre a Psique</text>
  <text x="100" y="458" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">◆  Os Arquétipos Fundamentais</text>
  <text x="100" y="476" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">◆  A Sombra: O Que Você Esconde</text>
  <text x="100" y="494" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">◆  Individuação: Tornando-se Quem É</text>
  <text x="100" y="512" font-family="Arial, sans-serif" font-size="11" fill="#C9A84C" opacity="0.95" font-weight="bold">★  Bônus: Jung e a Neurociência</text>
  <text x="100" y="535" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B" opacity="0.6" font-style="italic">24 aulas + 5 exercícios práticos</text>

  <!-- Box direito -->
  <rect x="480" y="395" width="340" height="155" rx="10" fill="#D4A373" opacity="0.12" stroke="#D4A373" stroke-width="1" opacity="0.35"/>

  <text x="500" y="420" font-family="Arial, sans-serif" font-size="11" fill="#1B3A4B" font-weight="bold" opacity="0.85">VOCÊ VAI APRENDER</text>
  <text x="500" y="440" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">✦  Identificar seus arquétipos dominantes</text>
  <text x="500" y="458" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">✦  Trabalhar com sua Sombra pessoal</text>
  <text x="500" y="476" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">✦  Interpretar sonhos com método junguiano</text>
  <text x="500" y="494" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">✦  Iniciar seu processo de individuação</text>
  <text x="500" y="512" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.9">✦  Criar sua mandala pessoal</text>
  <text x="500" y="535" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B" opacity="0.6" font-style="italic">Nível intermediário — 12 horas</text>

  <!-- Rodapé -->
  <line x1="80" y1="572" x2="820" y2="572" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <text x="450" y="588" font-family="Georgia, serif" font-size="13" fill="#2D6A4F" text-anchor="middle" font-style="italic" opacity="0.8">Rosangela Sousa — Psicanalista · Neurocientista · Terapeuta Holística</text>
</svg>

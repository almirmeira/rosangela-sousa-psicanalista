<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD"/>
      <stop offset="100%" style="stop-color:#EAD9B8"/>
    </linearGradient>
    <linearGradient id="egoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#A88830"/>
    </linearGradient>
    <linearGradient id="personaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A373"/>
      <stop offset="100%" style="stop-color:#B8834A"/>
    </linearGradient>
    <linearGradient id="pessoalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D6A4F"/>
      <stop offset="100%" style="stop-color:#1E4D3A"/>
    </linearGradient>
    <linearGradient id="coletivoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A4B"/>
      <stop offset="100%" style="stop-color:#0D2230"/>
    </linearGradient>
    <filter id="sombra">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#00000030"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg1)"/>

  <!-- Borda decorativa -->
  <rect x="15" y="15" width="870" height="570" rx="12" fill="none" stroke="#2D6A4F" stroke-width="1.5" opacity="0.4"/>

  <!-- Título -->
  <text x="450" y="52" font-family="Georgia, serif" font-size="24" fill="#1B3A4B" text-anchor="middle" font-weight="bold">A Estrutura da Psique Junguiana</text>
  <text x="450" y="74" font-family="Arial, sans-serif" font-size="13" fill="#2D6A4F" text-anchor="middle" font-style="italic">Módulo 1 — Jung: Um Novo Olhar Sobre a Psique</text>
  <line x1="200" y1="85" x2="700" y2="85" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>

  <!-- Diagrama de camadas da psique (oceano de consciência) -->
  <!-- Camada 1: CONSCIÊNCIA / EGO (topo - acima da linha da água) -->
  <rect x="100" y="100" width="700" height="90" rx="8" fill="url(#egoGrad)" opacity="0.88" filter="url(#sombra)"/>
  <text x="450" y="133" font-family="Georgia, serif" font-size="17" fill="#FFF8E7" text-anchor="middle" font-weight="bold">CONSCIÊNCIA — EGO</text>
  <text x="450" y="153" font-family="Arial, sans-serif" font-size="12" fill="#FFF8E7" text-anchor="middle" opacity="0.9">Centro da consciência | O "eu" que pensa, sente e decide</text>
  <text x="450" y="172" font-family="Arial, sans-serif" font-size="11" fill="#FFF8E7" text-anchor="middle" opacity="0.8">Memórias conscientes · Vontade · Identidade cotidiana · Raciocínio lógico</text>

  <!-- Ícone ego -->
  <circle cx="155" cy="147" r="22" fill="#FFF8E7" opacity="0.2"/>
  <text x="155" y="154" font-family="Arial, sans-serif" font-size="18" fill="#FFF8E7" text-anchor="middle">☀</text>

  <!-- Linha da consciência (superfície da água) -->
  <line x1="80" y1="200" x2="820" y2="200" stroke="#2D6A4F" stroke-width="2.5" stroke-dasharray="10,4" opacity="0.7"/>
  <text x="840" y="205" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" opacity="0.8">← limiar</text>

  <!-- PERSONA (flutuando acima e ao lado) -->
  <rect x="620" y="105" width="155" height="55" rx="20" fill="url(#personaGrad)" opacity="0.9" filter="url(#sombra)"/>
  <text x="697" y="127" font-family="Georgia, serif" font-size="13" fill="#FFF8E7" text-anchor="middle" font-weight="bold">PERSONA</text>
  <text x="697" y="146" font-family="Arial, sans-serif" font-size="10" fill="#FFF8E7" text-anchor="middle">"Máscara social"</text>
  <!-- seta conectando Ego-Persona -->
  <path d="M 700 160 Q 720 185 700 200" stroke="#D4A373" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.8"/>

  <!-- Camada 2: INCONSCIENTE PESSOAL -->
  <rect x="100" y="210" width="700" height="105" rx="8" fill="url(#pessoalGrad)" opacity="0.80" filter="url(#sombra)"/>
  <text x="450" y="241" font-family="Georgia, serif" font-size="16" fill="#F4E9CD" text-anchor="middle" font-weight="bold">INCONSCIENTE PESSOAL</text>
  <text x="450" y="260" font-family="Arial, sans-serif" font-size="12" fill="#D4E8DD" text-anchor="middle" opacity="0.9">Memórias reprimidas, traumas, complexos, desejos esquecidos</text>

  <!-- SOMBRA badge -->
  <rect x="130" y="270" width="130" height="34" rx="8" fill="#1B3A4B" opacity="0.7"/>
  <text x="195" y="292" font-family="Georgia, serif" font-size="13" fill="#F4E9CD" text-anchor="middle" font-weight="bold">SOMBRA</text>

  <!-- ANIMA/ANIMUS badge -->
  <rect x="280" y="270" width="145" height="34" rx="8" fill="#1B3A4B" opacity="0.7"/>
  <text x="352" y="292" font-family="Arial, sans-serif" font-size="12" fill="#F4E9CD" text-anchor="middle">Anima / Animus</text>

  <!-- Complexos badge -->
  <rect x="445" y="270" width="110" height="34" rx="8" fill="#1B3A4B" opacity="0.7"/>
  <text x="500" y="292" font-family="Arial, sans-serif" font-size="12" fill="#F4E9CD" text-anchor="middle">Complexos</text>

  <!-- Sonhos badge -->
  <rect x="575" y="270" width="110" height="34" rx="8" fill="#1B3A4B" opacity="0.7"/>
  <text x="630" y="292" font-family="Arial, sans-serif" font-size="12" fill="#F4E9CD" text-anchor="middle">Sonhos</text>

  <!-- Camada 3: INCONSCIENTE COLETIVO -->
  <rect x="100" y="325" width="700" height="110" rx="8" fill="url(#coletivoGrad)" opacity="0.87" filter="url(#sombra)"/>
  <text x="450" y="355" font-family="Georgia, serif" font-size="16" fill="#F4E9CD" text-anchor="middle" font-weight="bold">INCONSCIENTE COLETIVO</text>
  <text x="450" y="374" font-family="Arial, sans-serif" font-size="12" fill="#C5D8E0" text-anchor="middle" opacity="0.9">Herança psíquica da humanidade — universal e transpessoal</text>

  <!-- Arquétipos no coletivo -->
  <circle cx="175" cy="408" r="20" fill="#C9A84C" opacity="0.7"/>
  <text x="175" y="413" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">Herói</text>
  <circle cx="255" cy="408" r="20" fill="#2D6A4F" opacity="0.7"/>
  <text x="255" y="413" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">Sombra</text>
  <circle cx="335" cy="408" r="20" fill="#D4A373" opacity="0.7"/>
  <text x="335" y="413" font-family="Arial, sans-serif" font-size="9" fill="#FFF" text-anchor="middle">Gr. Mãe</text>
  <circle cx="415" cy="408" r="20" fill="#1B3A4B" opacity="0.7"/>
  <text x="415" y="413" font-family="Arial, sans-serif" font-size="9" fill="#FFF" text-anchor="middle">Sábio</text>
  <circle cx="495" cy="408" r="20" fill="#C9A84C" opacity="0.7"/>
  <text x="495" y="413" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">Self</text>
  <circle cx="575" cy="408" r="20" fill="#2D6A4F" opacity="0.7"/>
  <text x="575" y="413" font-family="Arial, sans-serif" font-size="9" fill="#FFF" text-anchor="middle">Anima</text>
  <circle cx="655" cy="408" r="20" fill="#D4A373" opacity="0.7"/>
  <text x="655" y="413" font-family="Arial, sans-serif" font-size="9" fill="#FFF" text-anchor="middle">Trickster</text>
  <circle cx="730" cy="408" r="18" fill="#1B3A4B" opacity="0.7"/>
  <text x="730" y="413" font-family="Arial, sans-serif" font-size="9" fill="#FFF" text-anchor="middle">...</text>

  <text x="450" y="428" font-family="Arial, sans-serif" font-size="10" fill="#A0BFC8" text-anchor="middle" font-style="italic">Arquétipos — padrões universais herdados</text>

  <!-- SELF — no centro de tudo -->
  <rect x="100" y="445" width="700" height="60" rx="8" fill="#C9A84C" opacity="0.22" stroke="#C9A84C" stroke-width="2"/>
  <text x="450" y="473" font-family="Georgia, serif" font-size="17" fill="#1B3A4B" text-anchor="middle" font-weight="bold">SELF — O Centro Organizador de Toda a Psique</text>
  <text x="450" y="493" font-family="Arial, sans-serif" font-size="12" fill="#2D6A4F" text-anchor="middle" font-style="italic">"A totalidade do ser — consciente e inconsciente — e seu centro mais profundo"</text>

  <!-- Setas de influência -->
  <path d="M 450 315 L 450 325" stroke="#F4E9CD" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 450 435 L 450 445" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>

  <!-- Legenda -->
  <rect x="100" y="520" width="700" height="60" rx="6" fill="#2D6A4F" opacity="0.07" stroke="#2D6A4F" stroke-width="0.8" opacity="0.3"/>
  <text x="130" y="540" font-family="Arial, sans-serif" font-size="11" fill="#1B3A4B" font-weight="bold">SINCRONICIDADE:</text>
  <text x="245" y="540" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" font-style="italic">"coincidências significativas" que conectam a psique interior com eventos externos</text>
  <text x="130" y="560" font-family="Arial, sans-serif" font-size="11" fill="#1B3A4B" font-weight="bold">INDIVIDUAÇÃO:</text>
  <text x="230" y="560" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" font-style="italic">jornada de integração de todas as camadas — rumo ao Self</text>
</svg>

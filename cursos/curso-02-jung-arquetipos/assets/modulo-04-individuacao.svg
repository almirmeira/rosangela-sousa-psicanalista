<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bgM4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD"/>
      <stop offset="100%" style="stop-color:#EBD8B5"/>
    </linearGradient>
    <radialGradient id="selfCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#C9A84C;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </radialGradient>
    <filter id="sh4">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000030"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgM4)"/>
  <rect x="15" y="15" width="870" height="570" rx="12" fill="none" stroke="#2D6A4F" stroke-width="1.5" opacity="0.4"/>

  <!-- Título -->
  <text x="450" y="48" font-family="Georgia, serif" font-size="24" fill="#1B3A4B" text-anchor="middle" font-weight="bold">Individuação — Tornando-se Quem Você É</text>
  <text x="450" y="68" font-family="Arial, sans-serif" font-size="13" fill="#2D6A4F" text-anchor="middle" font-style="italic">Módulo 4 — A Jornada Rumo ao Self</text>
  <line x1="200" y1="78" x2="700" y2="78" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>

  <!-- Espiral de individuação (linha principal) -->
  <!-- Representação da espiral com arcos progressivos -->
  <path d="M 100 300 Q 180 440 280 380 Q 380 320 380 280 Q 380 220 350 200 Q 310 175 280 195 Q 240 220 250 270 Q 260 310 290 330 Q 330 350 370 340 Q 420 320 440 290 Q 460 255 450 230 Q 435 195 410 185" stroke="#2D6A4F" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Linha principal da jornada — horizontal com arcos ascendentes -->
  <path d="M 80 430 C 130 380 180 350 220 370 C 270 395 290 440 350 420 C 410 400 430 340 480 320 C 530 300 560 315 600 295 C 650 270 680 230 730 220 C 760 215 790 225 820 240" stroke="#2D6A4F" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Setas na linha principal -->
  <polygon points="820,240 808,233 812,246" fill="#2D6A4F" opacity="0.7"/>

  <!-- Estágios da individuação como marcos na linha -->

  <!-- Estágio 1: Confronto com a Persona -->
  <circle cx="160" cy="420" r="35" fill="#D4A373" opacity="0.9" filter="url(#sh4)"/>
  <text x="160" y="412" font-family="Arial, sans-serif" font-size="9" fill="#FFF8E7" text-anchor="middle" font-weight="bold">CONFRONTO</text>
  <text x="160" y="424" font-family="Arial, sans-serif" font-size="9" fill="#FFF8E7" text-anchor="middle">COM A</text>
  <text x="160" y="436" font-family="Arial, sans-serif" font-size="9" fill="#FFF8E7" text-anchor="middle">PERSONA</text>
  <text x="160" y="475" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Etapa 1</text>

  <!-- Estágio 2: Encontro com a Sombra -->
  <circle cx="310" cy="410" r="35" fill="#1B3A4B" opacity="0.88" filter="url(#sh4)"/>
  <text x="310" y="402" font-family="Arial, sans-serif" font-size="9" fill="#F4E9CD" text-anchor="middle" font-weight="bold">ENCONTRO</text>
  <text x="310" y="414" font-family="Arial, sans-serif" font-size="9" fill="#F4E9CD" text-anchor="middle">COM A</text>
  <text x="310" y="426" font-family="Arial, sans-serif" font-size="9" fill="#F4E9CD" text-anchor="middle">SOMBRA</text>
  <text x="310" y="465" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Etapa 2</text>

  <!-- Estágio 3: Encontro com Anima/Animus -->
  <circle cx="460" cy="310" r="35" fill="#2D6A4F" opacity="0.88" filter="url(#sh4)"/>
  <text x="460" y="302" font-family="Arial, sans-serif" font-size="9" fill="#F4E9CD" text-anchor="middle" font-weight="bold">ANIMA /</text>
  <text x="460" y="314" font-family="Arial, sans-serif" font-size="9" fill="#F4E9CD" text-anchor="middle">ANIMUS</text>
  <text x="460" y="326" font-family="Arial, sans-serif" font-size="9" fill="#D4E8DD" text-anchor="middle">integração</text>
  <text x="460" y="362" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Etapa 3</text>

  <!-- Estágio 4: Velho Sábio / Grande Mãe -->
  <circle cx="605" cy="285" r="35" fill="#C9A84C" opacity="0.88" filter="url(#sh4)"/>
  <text x="605" y="277" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle" font-weight="bold">VELHO SÁBIO</text>
  <text x="605" y="289" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">GR. MÃE</text>
  <text x="605" y="301" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">sabedoria</text>
  <text x="605" cy="340" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Etapa 4</text>
  <text x="605" y="340" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Etapa 4</text>

  <!-- SELF — centro final -->
  <circle cx="800" cy="240" r="45" fill="url(#selfCenter)" filter="url(#sh4)"/>
  <circle cx="800" cy="240" r="38" fill="#C9A84C" opacity="0.92"/>
  <circle cx="800" cy="240" r="28" fill="none" stroke="#FFF8E7" stroke-width="1.5" opacity="0.6"/>
  <text x="800" y="234" font-family="Georgia, serif" font-size="15" fill="#FFF8E7" text-anchor="middle" font-weight="bold">SELF</text>
  <text x="800" y="249" font-family="Arial, sans-serif" font-size="9" fill="#FFF8E7" text-anchor="middle">totalidade</text>
  <text x="800" y="298" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Destino</text>

  <!-- Mandala simplificada ao lado do SELF -->
  <circle cx="800" cy="450" r="65" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  <circle cx="800" cy="450" r="50" fill="none" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <circle cx="800" cy="450" r="35" fill="none" stroke="#D4A373" stroke-width="1" opacity="0.4"/>
  <!-- pétalas mandala -->
  <ellipse cx="800" cy="400" rx="10" ry="25" fill="#C9A84C" opacity="0.3"/>
  <ellipse cx="800" cy="500" rx="10" ry="25" fill="#C9A84C" opacity="0.3"/>
  <ellipse cx="750" cy="450" rx="25" ry="10" fill="#C9A84C" opacity="0.3"/>
  <ellipse cx="850" cy="450" rx="25" ry="10" fill="#C9A84C" opacity="0.3"/>
  <ellipse cx="765" cy="415" rx="10" ry="25" transform="rotate(45 765 415)" fill="#2D6A4F" opacity="0.25"/>
  <ellipse cx="835" cy="415" rx="10" ry="25" transform="rotate(-45 835 415)" fill="#2D6A4F" opacity="0.25"/>
  <ellipse cx="765" cy="485" rx="10" ry="25" transform="rotate(-45 765 485)" fill="#2D6A4F" opacity="0.25"/>
  <ellipse cx="835" cy="485" rx="10" ry="25" transform="rotate(45 835 485)" fill="#2D6A4F" opacity="0.25"/>
  <circle cx="800" cy="450" r="20" fill="#F4E9CD" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="800" y="455" font-family="Georgia, serif" font-size="12" fill="#1B3A4B" text-anchor="middle">ψ</text>
  <text x="800" y="528" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-style="italic">Mandala — símbolo do Self</text>

  <!-- Ferramentas da individuação (painel esquerdo) -->
  <rect x="30" y="95" width="100" height="320" rx="10" fill="#2D6A4F" opacity="0.07" stroke="#2D6A4F" stroke-width="1" opacity="0.3"/>
  <text x="80" y="118" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B" text-anchor="middle" font-weight="bold">FERRAMENTAS</text>
  <line x1="35" y1="125" x2="125" y2="125" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <text x="80" y="145" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">📓 Diário</text>
  <text x="80" y="163" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">💭 Sonhos</text>
  <text x="80" y="181" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">🎨 Mandala</text>
  <text x="80" y="199" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">✍ Escrita</text>
  <text x="80" y="217" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">🧘 Meditação</text>
  <text x="80" y="235" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">🎭 Imaginação</text>
  <text x="80" y="253" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">Ativa</text>
  <text x="80" y="271" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">🔄 Sincron.</text>
  <text x="80" y="289" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">💬 Análise</text>
  <text x="80" y="307" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">📿 Rituais</text>
  <text x="80" y="325" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">🌿 Corpo</text>
  <text x="80" y="343" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle">🎵 Arte</text>

  <!-- Citação -->
  <rect x="30" y="470" width="700" height="80" rx="10" fill="#C9A84C" opacity="0.10" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  <text x="50" y="496" font-family="Georgia, serif" font-size="13" fill="#1B3A4B" font-style="italic">"A individuação não é perfeição — é tornar-se inteiro. Não o melhor ser humano,</text>
  <text x="50" y="514" font-family="Georgia, serif" font-size="13" fill="#1B3A4B" font-style="italic">mas o ser humano mais autêntico que você pode ser."</text>
  <text x="50" y="538" font-family="Arial, sans-serif" font-size="12" fill="#2D6A4F" font-weight="bold">— Carl Gustav Jung</text>

  <!-- Rodapé -->
  <line x1="30" y1="562" x2="870" y2="562" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <text x="450" y="580" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" text-anchor="middle" font-style="italic">A individuação é uma jornada de vida — não um destino, mas um caminho em constante aprofundamento</text>
</svg>

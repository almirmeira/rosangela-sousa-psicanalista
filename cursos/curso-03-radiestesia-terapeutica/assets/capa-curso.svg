<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- Fundo creme degradê -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EDD9A3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pendulumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A373;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2D6A4F;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2D6A4F;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="900" height="600" fill="url(#bgGrad)" />

  <!-- Círculos decorativos de fundo -->
  <circle cx="150" cy="100" r="120" fill="none" stroke="#2D6A4F" stroke-width="1" opacity="0.15"/>
  <circle cx="150" cy="100" r="90" fill="none" stroke="#2D6A4F" stroke-width="1" opacity="0.15"/>
  <circle cx="750" cy="500" r="150" fill="none" stroke="#4A0E8F" stroke-width="1" opacity="0.12"/>
  <circle cx="750" cy="500" r="100" fill="none" stroke="#4A0E8F" stroke-width="1" opacity="0.12"/>

  <!-- Arco decorativo superior esquerdo -->
  <path d="M 0 0 Q 200 50 250 200" fill="none" stroke="#2D6A4F" stroke-width="2" opacity="0.25"/>
  <path d="M 0 0 Q 220 70 280 230" fill="none" stroke="#D4A373" stroke-width="1.5" opacity="0.2"/>

  <!-- Arco decorativo inferior direito -->
  <path d="M 900 600 Q 700 550 650 400" fill="none" stroke="#4A0E8F" stroke-width="2" opacity="0.2"/>

  <!-- Pêndulo central -->
  <!-- Fio do pêndulo -->
  <line x1="450" y1="60" x2="450" y2="240" stroke="#C9A84C" stroke-width="2.5" />
  <!-- Ponto de suspensão -->
  <circle cx="450" cy="58" r="8" fill="#C9A84C" filter="url(#shadow)"/>
  <!-- Bob do pêndulo (cristal facetado) -->
  <polygon points="450,240 430,275 450,300 470,275" fill="url(#pendulumGrad)" filter="url(#shadow)" opacity="0.95"/>
  <polygon points="450,240 430,275 450,260 470,275" fill="#C9A84C" opacity="0.6"/>
  <!-- Brilho no cristal -->
  <line x1="437" y1="255" x2="443" y2="268" stroke="white" stroke-width="1.5" opacity="0.7"/>

  <!-- Arco radiestésico ao redor do pêndulo -->
  <path d="M 330 320 A 135 135 0 0 1 570 320" fill="none" stroke="#2D6A4F" stroke-width="3" opacity="0.6"/>
  <path d="M 345 330 A 120 120 0 0 1 555 330" fill="none" stroke="#D4A373" stroke-width="1.5" opacity="0.5"/>
  <!-- Marcações no arco -->
  <line x1="330" y1="320" x2="322" y2="340" stroke="#2D6A4F" stroke-width="2" opacity="0.6"/>
  <line x1="363" y1="260" x2="353" y2="250" stroke="#2D6A4F" stroke-width="1.5" opacity="0.5"/>
  <line x1="450" y1="186" x2="450" y2="174" stroke="#2D6A4F" stroke-width="2" opacity="0.6"/>
  <line x1="537" y1="260" x2="547" y2="250" stroke="#2D6A4F" stroke-width="1.5" opacity="0.5"/>
  <line x1="570" y1="320" x2="578" y2="340" stroke="#2D6A4F" stroke-width="2" opacity="0.6"/>

  <!-- Labels do arco -->
  <text x="310" y="358" font-family="Georgia, serif" font-size="12" fill="#2D6A4F" opacity="0.7">NÃO</text>
  <text x="435" y="172" font-family="Georgia, serif" font-size="12" fill="#2D6A4F" opacity="0.7">SIM</text>
  <text x="558" y="358" font-family="Georgia, serif" font-size="12" fill="#2D6A4F" opacity="0.7">SIM</text>

  <!-- Chakras pequenos à esquerda -->
  <text x="90" y="180" font-family="Arial" font-size="22" fill="#FF0000" opacity="0.7">●</text>
  <text x="90" y="215" font-family="Arial" font-size="22" fill="#FF7700" opacity="0.7">●</text>
  <text x="90" y="250" font-family="Arial" font-size="22" fill="#FFD700" opacity="0.7">●</text>
  <text x="90" y="285" font-family="Arial" font-size="22" fill="#00AA00" opacity="0.7">●</text>
  <text x="90" y="320" font-family="Arial" font-size="22" fill="#0077FF" opacity="0.7">●</text>
  <text x="90" y="355" font-family="Arial" font-size="22" fill="#4400AA" opacity="0.7">●</text>
  <text x="90" y="390" font-family="Arial" font-size="22" fill="#7B00AA" opacity="0.7">●</text>
  <text x="78" y="180" font-family="Georgia, serif" font-size="9" fill="#2D6A4F" opacity="0.6" text-anchor="middle">❋</text>

  <!-- Texto "CHAKRAS" ao lado -->
  <text x="125" y="290" font-family="Georgia, serif" font-size="11" fill="#4A0E8F" opacity="0.6" writing-mode="vertical-rl" transform="rotate(0, 125, 290)">CHAKRAS</text>

  <!-- Título principal -->
  <text x="450" y="370" font-family="Georgia, serif" font-size="38" fill="#2D6A4F" text-anchor="middle" font-weight="bold" filter="url(#shadow)">RADIESTESIA</text>
  <text x="450" y="412" font-family="Georgia, serif" font-size="28" fill="#4A0E8F" text-anchor="middle" font-weight="bold">TERAPÊUTICA</text>

  <!-- Subtítulo -->
  <rect x="260" y="428" width="380" height="2" fill="#C9A84C" opacity="0.8"/>
  <text x="450" y="452" font-family="Georgia, serif" font-size="16" fill="#D4A373" text-anchor="middle" font-style="italic">Do Iniciante ao Praticante</text>
  <rect x="260" y="462" width="380" height="2" fill="#C9A84C" opacity="0.8"/>

  <!-- Nome da instrutora -->
  <text x="450" y="492" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle">Rosangela Sousa</text>
  <text x="450" y="512" font-family="Georgia, serif" font-size="11" fill="#4A0E8F" text-anchor="middle" font-style="italic">Psicanalista • Neurocientista • Terapeuta Holística • Radiestesista</text>

  <!-- Badges dos níveis -->
  <rect x="195" y="535" width="130" height="38" rx="19" fill="#2D6A4F" opacity="0.85"/>
  <text x="260" y="549" font-family="Georgia, serif" font-size="10" fill="#F4E9CD" text-anchor="middle" font-weight="bold">NÍVEL 1</text>
  <text x="260" y="563" font-family="Georgia, serif" font-size="9" fill="#C9A84C" text-anchor="middle">Iniciante • 8h • R$ 197</text>

  <rect x="385" y="535" width="130" height="38" rx="19" fill="#4A0E8F" opacity="0.85"/>
  <text x="450" y="549" font-family="Georgia, serif" font-size="10" fill="#F4E9CD" text-anchor="middle" font-weight="bold">NÍVEL 2</text>
  <text x="450" y="563" font-family="Georgia, serif" font-size="9" fill="#C9A84C" text-anchor="middle">Intermediário • 16h • R$ 397</text>

  <rect x="575" y="535" width="130" height="38" rx="19" fill="#C9A84C" opacity="0.85"/>
  <text x="640" y="549" font-family="Georgia, serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-weight="bold">NÍVEL 3</text>
  <text x="640" y="563" font-family="Georgia, serif" font-size="9" fill="#2D6A4F" text-anchor="middle">Avançado • 24h • Incluso</text>

  <!-- Varetas radiestésicas à direita -->
  <!-- Vareta esquerda (em L) -->
  <line x1="790" y1="230" x2="790" y2="310" stroke="#C9A84C" stroke-width="3" opacity="0.6"/>
  <line x1="790" y1="310" x2="840" y2="310" stroke="#C9A84C" stroke-width="3" opacity="0.6"/>
  <!-- Vareta direita (em L) -->
  <line x1="860" y1="230" x2="860" y2="310" stroke="#D4A373" stroke-width="3" opacity="0.6"/>
  <line x1="860" y1="310" x2="810" y2="310" stroke="#D4A373" stroke-width="3" opacity="0.6"/>
  <text x="825" y="360" font-family="Georgia, serif" font-size="10" fill="#4A0E8F" text-anchor="middle" opacity="0.7">VARETAS</text>

  <!-- Rodapé -->
  <text x="450" y="592" font-family="Georgia, serif" font-size="10" fill="#2D6A4F" text-anchor="middle" opacity="0.6">Plataforma: Educa com Talento (Moodle) • 48 horas totais • Certificado incluso</text>
</svg>

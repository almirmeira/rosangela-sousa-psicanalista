<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD"/>
      <stop offset="100%" style="stop-color:#EDD9A3"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#E8C97A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B68EE"/>
      <stop offset="50%" style="stop-color:#9B88FF"/>
      <stop offset="100%" style="stop-color:#4A0E8F"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg2)"/>

  <!-- Título -->
  <rect x="0" y="0" width="900" height="60" fill="#2D6A4F" opacity="0.92"/>
  <text x="450" y="27" font-family="Georgia, serif" font-size="20" fill="#F4E9CD" text-anchor="middle" font-weight="bold">INSTRUMENTOS DE RADIESTESIA</text>
  <text x="450" y="48" font-family="Georgia, serif" font-size="12" fill="#C9A84C" text-anchor="middle" font-style="italic">Módulo 1.2 — Conhecendo os Instrumentos</text>

  <!-- === PÊNDULO ESFÉRICO === -->
  <text x="130" y="100" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Pêndulo Esférico</text>
  <text x="130" y="116" font-family="Georgia, serif" font-size="10" fill="#4A0E8F" text-anchor="middle">(Iniciantes)</text>
  <!-- Fio -->
  <line x1="130" y1="130" x2="130" y2="230" stroke="#C9A84C" stroke-width="2"/>
  <!-- Anel topo -->
  <ellipse cx="130" cy="130" rx="8" ry="5" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <!-- Bob esférico -->
  <circle cx="130" cy="255" r="25" fill="url(#metalGrad)" filter="url(#sh2)"/>
  <circle cx="122" cy="248" r="7" fill="white" opacity="0.3"/>
  <!-- Rótulo -->
  <rect x="68" y="295" width="124" height="18" rx="4" fill="#2D6A4F" opacity="0.7"/>
  <text x="130" y="308" font-family="Arial" font-size="9" fill="#F4E9CD" text-anchor="middle">Cobre ou latão • 20–30g</text>

  <!-- === PÊNDULO DE CRISTAL === -->
  <text x="310" y="100" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Pêndulo de Cristal</text>
  <text x="310" y="116" font-family="Georgia, serif" font-size="10" fill="#4A0E8F" text-anchor="middle">(Intermediário)</text>
  <!-- Fio -->
  <line x1="310" y1="130" x2="310" y2="215" stroke="#C9A84C" stroke-width="2"/>
  <ellipse cx="310" cy="130" rx="8" ry="5" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <!-- Cristal facetado -->
  <polygon points="310,215 290,248 300,270 310,278 320,270 330,248" fill="url(#crystalGrad)" filter="url(#sh2)"/>
  <polygon points="310,215 290,248 310,240 330,248" fill="#9B88FF" opacity="0.5"/>
  <line x1="296" y1="232" x2="303" y2="248" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Rótulo -->
  <rect x="248" y="295" width="124" height="18" rx="4" fill="#4A0E8F" opacity="0.7"/>
  <text x="310" y="308" font-family="Arial" font-size="9" fill="#F4E9CD" text-anchor="middle">Quartzo ou ametista • 15–25g</text>

  <!-- === PÊNDULO EGÍPCIO === -->
  <text x="490" y="100" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Pêndulo Egípcio</text>
  <text x="490" y="116" font-family="Georgia, serif" font-size="10" fill="#4A0E8F" text-anchor="middle">(Avançado)</text>
  <!-- Fio -->
  <line x1="490" y1="130" x2="490" y2="200" stroke="#C9A84C" stroke-width="2"/>
  <ellipse cx="490" cy="130" rx="8" ry="5" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <!-- Corpo do egípcio (cônico) -->
  <polygon points="490,200 475,240 490,252 505,240" fill="url(#metalGrad)" filter="url(#sh2)"/>
  <!-- Câmara interna -->
  <ellipse cx="490" cy="226" rx="10" ry="8" fill="#2D6A4F" opacity="0.4"/>
  <text x="490" y="229" font-family="Arial" font-size="7" fill="#F4E9CD" text-anchor="middle">∿</text>
  <!-- Ponteira -->
  <polygon points="490,252 485,272 490,280 495,272" fill="#C9A84C"/>
  <!-- Rótulo -->
  <rect x="428" y="295" width="124" height="18" rx="4" fill="#C9A84C" opacity="0.8"/>
  <text x="490" y="308" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle">Metal nobre • câmara vibratória</text>

  <!-- === VARETAS RADIESTÉSICAS (em L) === -->
  <text x="700" y="100" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Varetas em L</text>
  <text x="700" y="116" font-family="Georgia, serif" font-size="10" fill="#4A0E8F" text-anchor="middle">(Buscas no campo)</text>
  <!-- Vareta esquerda -->
  <line x1="660" y1="145" x2="660" y2="230" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="660" y1="230" x2="730" y2="230" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Vareta direita -->
  <line x1="740" y1="145" x2="740" y2="230" stroke="#D4A373" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="740" y1="230" x2="670" y2="230" stroke="#D4A373" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Seta de movimento -->
  <path d="M 695 255 Q 700 270 705 255" fill="none" stroke="#4A0E8F" stroke-width="1.5"/>
  <text x="700" y="290" font-family="Georgia, serif" font-size="10" fill="#4A0E8F" text-anchor="middle">abertura = SIM</text>
  <!-- Rótulo -->
  <rect x="638" y="300" width="124" height="18" rx="4" fill="#2D6A4F" opacity="0.7"/>
  <text x="700" y="313" font-family="Arial" font-size="9" fill="#F4E9CD" text-anchor="middle">Cobre ou arame • par simétrico</text>

  <!-- SEPARADOR HORIZONTAL -->
  <line x1="30" y1="335" x2="870" y2="335" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>

  <!-- VARÃO DE LECHER -->
  <text x="450" y="365" font-family="Georgia, serif" font-size="15" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Varão de Lecher — Instrumento de Alta Precisão</text>

  <!-- Corpo do varão -->
  <rect x="120" y="385" width="520" height="18" rx="4" fill="url(#metalGrad)" filter="url(#sh2)"/>
  <!-- Escala graduada -->
  <line x1="140" y1="385" x2="140" y2="395" stroke="#2D6A4F" stroke-width="1.5"/>
  <line x1="180" y1="385" x2="180" y2="392" stroke="#2D6A4F" stroke-width="1"/>
  <line x1="220" y1="385" x2="220" y2="395" stroke="#2D6A4F" stroke-width="1.5"/>
  <line x1="260" y1="385" x2="260" y2="392" stroke="#2D6A4F" stroke-width="1"/>
  <line x1="300" y1="385" x2="300" y2="398" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="340" y1="385" x2="340" y2="392" stroke="#2D6A4F" stroke-width="1"/>
  <line x1="380" y1="385" x2="380" y2="395" stroke="#2D6A4F" stroke-width="1.5"/>
  <line x1="420" y1="385" x2="420" y2="392" stroke="#2D6A4F" stroke-width="1"/>
  <line x1="460" y1="385" x2="460" y2="395" stroke="#2D6A4F" stroke-width="1.5"/>
  <line x1="500" y1="385" x2="500" y2="392" stroke="#2D6A4F" stroke-width="1"/>
  <line x1="540" y1="385" x2="540" y2="398" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="580" y1="385" x2="580" y2="392" stroke="#2D6A4F" stroke-width="1"/>
  <line x1="620" y1="385" x2="620" y2="395" stroke="#2D6A4F" stroke-width="1.5"/>

  <!-- Cursor deslizante -->
  <rect x="370" y="379" width="22" height="30" rx="3" fill="#2D6A4F" filter="url(#sh2)"/>
  <line x1="381" y1="409" x2="381" y2="425" stroke="#2D6A4F" stroke-width="2"/>
  <!-- Ponteira inferior -->
  <line x1="381" y1="425" x2="381" y2="450" stroke="#C9A84C" stroke-width="2"/>
  <circle cx="381" cy="455" r="5" fill="#C9A84C"/>

  <!-- Alça ergonômica -->
  <rect x="120" y="383" width="30" height="22" rx="8" fill="#D4A373" opacity="0.8"/>
  <text x="135" y="398" font-family="Arial" font-size="8" fill="#2D6A4F" text-anchor="middle">✋</text>

  <!-- Rótulos do varão -->
  <text x="135" y="378" font-family="Arial" font-size="9" fill="#4A0E8F">Alça</text>
  <text x="300" y="378" font-family="Arial" font-size="9" fill="#4A0E8F" text-anchor="middle">Escala (0–127 cm)</text>
  <text x="381" y="475" font-family="Arial" font-size="9" fill="#4A0E8F" text-anchor="middle">Ponteira</text>
  <text x="381" y="378" font-family="Arial" font-size="9" fill="#F4E9CD" text-anchor="middle">Cursor</text>

  <!-- Tabela de comprimentos -->
  <rect x="70" y="490" width="760" height="90" rx="8" fill="#2D6A4F" opacity="0.08" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="450" y="510" font-family="Georgia, serif" font-size="12" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Comprimentos-chave do Varão de Lecher</text>
  <text x="160" y="530" font-family="Arial" font-size="10" fill="#4A0E8F" text-anchor="middle" font-weight="bold">Comprimento</text>
  <text x="370" y="530" font-family="Arial" font-size="10" fill="#4A0E8F" text-anchor="middle" font-weight="bold">Aplicação</text>
  <text x="620" y="530" font-family="Arial" font-size="10" fill="#4A0E8F" text-anchor="middle" font-weight="bold">Tradição</text>
  <line x1="80" y1="535" x2="820" y2="535" stroke="#C9A84C" stroke-width="1"/>
  <text x="160" y="550" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle">10 cm (10 KÅ)</text>
  <text x="370" y="550" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle">Sistema endócrino</text>
  <text x="620" y="550" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle">André de Belizal</text>
  <text x="160" y="565" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle">62,5 cm</text>
  <text x="370" y="565" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle">Força vital</text>
  <text x="620" y="565" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle">Escola Francesa</text>

  <!-- Rodapé -->
  <rect x="0" y="575" width="900" height="25" fill="#2D6A4F" opacity="0.75"/>
  <text x="450" y="591" font-family="Georgia, serif" font-size="10" fill="#F4E9CD" text-anchor="middle">Módulo 1.2 | Radiestesia Terapêutica — Do Iniciante ao Praticante | Rosangela Sousa</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD"/>
      <stop offset="100%" style="stop-color:#EDD9A3"/>
    </linearGradient>
    <filter id="sh4">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000028"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg4)"/>

  <!-- Título -->
  <rect x="0" y="0" width="900" height="60" fill="#C9A84C" opacity="0.9"/>
  <text x="450" y="27" font-family="Georgia, serif" font-size="20" fill="#2D6A4F" text-anchor="middle" font-weight="bold">GRÁFICOS RADIESTÉSICOS</text>
  <text x="450" y="48" font-family="Georgia, serif" font-size="12" fill="#2D6A4F" text-anchor="middle" font-style="italic">Módulo 2.2 — Anatomia, Uso e Criação dos Gráficos</text>

  <!-- GRÁFICO SEMICIRCULAR DE PORCENTAGEM (centro-esquerda) -->
  <text x="195" y="90" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Gráfico de %</text>

  <!-- Semicírculo principal -->
  <path d="M 70 320 A 140 140 0 0 1 350 320" fill="#F4E9CD" stroke="#2D6A4F" stroke-width="3" filter="url(#sh4)"/>
  <!-- Preenchimento interno leve -->
  <path d="M 80 320 A 130 130 0 0 1 340 320" fill="#EDD9A3" opacity="0.5"/>

  <!-- Linhas de divisão a cada 10% -->
  <!-- 0% = 180° (esquerda) -->
  <!-- 100% = 0° (direita) -->
  <!-- Calculando: ângulo = 180 - (pct * 1.8) graus -->
  <!-- Centro: 210,320 -->
  <text x="65" y="340" font-family="Arial" font-size="11" fill="#2D6A4F" font-weight="bold">0%</text>
  <text x="344" y="340" font-family="Arial" font-size="11" fill="#2D6A4F" font-weight="bold">100%</text>
  <text x="205" y="200" font-family="Arial" font-size="11" fill="#2D6A4F" text-anchor="middle" font-weight="bold">50%</text>

  <!-- Marcações de 10 em 10 -->
  <!-- 10% -->
  <line x1="210" y1="320" x2="79" y2="295" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <text x="62" y="293" font-family="Arial" font-size="9" fill="#4A0E8F">10</text>
  <!-- 20% -->
  <line x1="210" y1="320" x2="84" y2="244" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <text x="66" y="242" font-family="Arial" font-size="9" fill="#4A0E8F">20</text>
  <!-- 30% -->
  <line x1="210" y1="320" x2="113" y2="205" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <text x="95" y="203" font-family="Arial" font-size="9" fill="#4A0E8F">30</text>
  <!-- 40% -->
  <line x1="210" y1="320" x2="157" y2="186" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <text x="145" y="182" font-family="Arial" font-size="9" fill="#4A0E8F">40</text>
  <!-- 50% -->
  <line x1="210" y1="320" x2="210" y2="182" stroke="#2D6A4F" stroke-width="2" opacity="0.6"/>
  <!-- 60% -->
  <line x1="210" y1="320" x2="263" y2="186" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <text x="268" y="182" font-family="Arial" font-size="9" fill="#4A0E8F">60</text>
  <!-- 70% -->
  <line x1="210" y1="320" x2="307" y2="205" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <text x="312" y="203" font-family="Arial" font-size="9" fill="#4A0E8F">70</text>
  <!-- 80% -->
  <line x1="210" y1="320" x2="336" y2="244" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <text x="340" y="242" font-family="Arial" font-size="9" fill="#4A0E8F">80</text>
  <!-- 90% -->
  <line x1="210" y1="320" x2="341" y2="295" stroke="#2D6A4F" stroke-width="1" opacity="0.4"/>
  <text x="345" y="293" font-family="Arial" font-size="9" fill="#4A0E8F">90</text>

  <!-- Agulha do pêndulo indicando 70% -->
  <line x1="210" y1="320" x2="307" y2="205" stroke="#D4A373" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="210" cy="320" r="7" fill="#D4A373" filter="url(#sh4)"/>
  <text x="210" y="345" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Centro</text>

  <!-- Pêndulo acima do gráfico -->
  <line x1="307" y1="165" x2="307" y2="205" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="307" cy="158" r="8" fill="#C9A84C" opacity="0.8"/>

  <!-- Zonas coloridas no arco -->
  <path d="M 80 320 A 130 130 0 0 1 154 196" fill="none" stroke="#D4A373" stroke-width="8" opacity="0.35" stroke-linecap="round"/>
  <path d="M 154 196 A 130 130 0 0 1 266 196" fill="none" stroke="#2D6A4F" stroke-width="8" opacity="0.35" stroke-linecap="round"/>
  <path d="M 266 196 A 130 130 0 0 1 340 320" fill="none" stroke="#4A0E8F" stroke-width="8" opacity="0.25" stroke-linecap="round"/>

  <text x="100" y="370" font-family="Arial" font-size="9" fill="#D4A373" font-weight="bold">Baixo (0–40%)</text>
  <text x="190" y="378" font-family="Arial" font-size="9" fill="#2D6A4F" font-weight="bold" text-anchor="middle">Médio (40–70%)</text>
  <text x="305" y="370" font-family="Arial" font-size="9" fill="#4A0E8F" font-weight="bold">Alto (70–100%)</text>

  <!-- GRÁFICO DE ESTADOS EMOCIONAIS (centro) -->
  <text x="560" y="90" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Gráfico de Estados Emocionais</text>

  <!-- Semicírculo menor -->
  <path d="M 430 310 A 130 130 0 0 1 690 310" fill="#F4E9CD" stroke="#4A0E8F" stroke-width="2.5" filter="url(#sh4)"/>
  <path d="M 440 310 A 120 120 0 0 1 680 310" fill="#EDD9A3" opacity="0.4"/>

  <!-- Seções do gráfico emocional -->
  <!-- Cada seção cobre 20° aprox -->
  <!-- Medo -->
  <line x1="560" y1="310" x2="433" y2="282" stroke="#4A0E8F" stroke-width="1.5"/>
  <text x="418" y="278" font-family="Arial" font-size="9" fill="#4A0E8F">MEDO</text>
  <!-- Tristeza -->
  <line x1="560" y1="310" x2="440" y2="222" stroke="#4A0E8F" stroke-width="1.5"/>
  <text x="420" y="218" font-family="Arial" font-size="9" fill="#4A0E8F">TRISTEZA</text>
  <!-- Raiva -->
  <line x1="560" y1="310" x2="482" y2="183" stroke="#D4A373" stroke-width="1.5"/>
  <text x="466" y="179" font-family="Arial" font-size="9" fill="#D4A373">RAIVA</text>
  <!-- Neutralidade -->
  <line x1="560" y1="310" x2="560" y2="182" stroke="#C9A84C" stroke-width="2"/>
  <text x="535" y="178" font-family="Arial" font-size="9" fill="#C9A84C">NEUTRO</text>
  <!-- Alegria -->
  <line x1="560" y1="310" x2="638" y2="183" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="643" y="179" font-family="Arial" font-size="9" fill="#2D6A4F">ALEGRIA</text>
  <!-- Amor -->
  <line x1="560" y1="310" x2="680" y2="222" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="685" y="218" font-family="Arial" font-size="9" fill="#2D6A4F">AMOR</text>
  <!-- Paz -->
  <line x1="560" y1="310" x2="687" y2="282" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="692" y="278" font-family="Arial" font-size="9" fill="#2D6A4F">PAZ</text>

  <!-- Agulha indicando NEUTRO -->
  <line x1="560" y1="310" x2="560" y2="215" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="560" cy="310" r="7" fill="#C9A84C" filter="url(#sh4)"/>
  <text x="560" y="330" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle">Centro</text>

  <!-- Legenda estados -->
  <text x="430" y="360" font-family="Arial" font-size="9" fill="#D4A373">◀ Bloqueio</text>
  <text x="560" y="360" font-family="Arial" font-size="9" fill="#C9A84C" text-anchor="middle">Equilíbrio ▲</text>
  <text x="690" y="360" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="end">Expansão ▶</text>

  <!-- TABELA DE COMO CRIAR GRÁFICOS (base) -->
  <rect x="30" y="400" width="840" height="165" rx="10" fill="#2D6A4F" opacity="0.08" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="450" y="425" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Anatomia de um Gráfico Radiestésico — Elementos Obrigatórios</text>

  <!-- Colunas da tabela -->
  <line x1="30" y1="435" x2="870" y2="435" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="130" y="451" font-family="Arial" font-size="11" fill="#4A0E8F" text-anchor="middle" font-weight="bold">ELEMENTO</text>
  <text x="380" y="451" font-family="Arial" font-size="11" fill="#4A0E8F" text-anchor="middle" font-weight="bold">DESCRIÇÃO</text>
  <text x="680" y="451" font-family="Arial" font-size="11" fill="#4A0E8F" text-anchor="middle" font-weight="bold">DICA DE CRIAÇÃO</text>
  <line x1="30" y1="457" x2="870" y2="457" stroke="#C9A84C" stroke-width="1"/>

  <text x="130" y="473" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Arco ou círculo</text>
  <text x="380" y="473" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Espaço de resposta</text>
  <text x="680" y="473" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Mínimo 180° — ângulo claro entre seções</text>

  <text x="130" y="491" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Ponto central</text>
  <text x="380" y="491" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Apoio do pêndulo</text>
  <text x="680" y="491" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Sempre marcado — referência de posição</text>

  <text x="130" y="509" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Divisões com rótulo</text>
  <text x="380" y="509" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Categorias de resposta</text>
  <text x="680" y="509" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Termos mutuamente exclusivos</text>

  <text x="130" y="527" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Título claro</text>
  <text x="380" y="527" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Identifica a finalidade</text>
  <text x="680" y="527" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Ex: "Gráfico de Chakras — Nível de Ativação"</text>

  <text x="130" y="545" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Intenção escrita</text>
  <text x="380" y="545" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">Pergunta a ser respondida</text>
  <text x="680" y="545" font-family="Arial" font-size="10" fill="#2D6A4F" text-anchor="middle">No verso — ancoragem de foco</text>

  <!-- Rodapé -->
  <rect x="0" y="573" width="900" height="27" fill="#C9A84C" opacity="0.75"/>
  <text x="450" y="591" font-family="Georgia, serif" font-size="10" fill="#2D6A4F" text-anchor="middle">Módulo 2.2 | Radiestesia Terapêutica — Do Iniciante ao Praticante | Rosangela Sousa</text>
</svg>

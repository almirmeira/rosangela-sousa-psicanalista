<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD"/>
      <stop offset="100%" style="stop-color:#EDD9A3"/>
    </linearGradient>
    <filter id="shC">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#00000030"/>
    </filter>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF4444;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FF4444;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00CC44;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00CC44;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="620" fill="url(#bgC)"/>

  <!-- Título -->
  <rect x="0" y="0" width="900" height="60" fill="#2D6A4F" opacity="0.92"/>
  <text x="450" y="27" font-family="Georgia, serif" font-size="20" fill="#F4E9CD" text-anchor="middle" font-weight="bold">SISTEMA DE CHAKRAS — RADIESTESIA E EQUILÍBRIO</text>
  <text x="450" y="48" font-family="Georgia, serif" font-size="12" fill="#C9A84C" text-anchor="middle" font-style="italic">Módulo 2.3 — Radiestesia e Chakras</text>

  <!-- SILHUETA DO CORPO HUMANO -->
  <!-- Cabeça -->
  <ellipse cx="320" cy="118" rx="32" ry="32" fill="#D4A373" opacity="0.4" stroke="#D4A373" stroke-width="1.5"/>
  <!-- Pescoço -->
  <rect x="310" y="150" width="20" height="20" rx="5" fill="#D4A373" opacity="0.3"/>
  <!-- Tronco -->
  <rect x="278" y="170" width="84" height="140" rx="20" fill="#D4A373" opacity="0.25" stroke="#D4A373" stroke-width="1"/>
  <!-- Braço esquerdo -->
  <rect x="240" y="178" width="22" height="90" rx="10" fill="#D4A373" opacity="0.2"/>
  <!-- Braço direito -->
  <rect x="378" y="178" width="22" height="90" rx="10" fill="#D4A373" opacity="0.2"/>
  <!-- Pernas -->
  <rect x="288" y="310" width="28" height="130" rx="12" fill="#D4A373" opacity="0.2"/>
  <rect x="324" y="310" width="28" height="130" rx="12" fill="#D4A373" opacity="0.2"/>

  <!-- CHAKRAS sobre o corpo -->

  <!-- 7 - Coronário (Sahasrara) -->
  <circle cx="320" cy="100" r="22" fill="#9B59B6" opacity="0.85" filter="url(#shC)"/>
  <text x="320" y="97" font-family="Arial" font-size="14" fill="white" text-anchor="middle">✦</text>
  <text x="320" y="113" font-family="Arial" font-size="8" fill="white" text-anchor="middle">7</text>

  <!-- 6 - Terceiro Olho (Ajna) -->
  <circle cx="320" cy="145" r="18" fill="#4A0E8F" opacity="0.85" filter="url(#shC)"/>
  <text x="320" y="142" font-family="Arial" font-size="12" fill="white" text-anchor="middle">◉</text>
  <text x="320" y="155" font-family="Arial" font-size="8" fill="white" text-anchor="middle">6</text>

  <!-- 5 - Garganta (Vishuddha) -->
  <circle cx="320" cy="182" r="18" fill="#1E90FF" opacity="0.85" filter="url(#shC)"/>
  <text x="320" y="179" font-family="Arial" font-size="12" fill="white" text-anchor="middle">◈</text>
  <text x="320" y="192" font-family="Arial" font-size="8" fill="white" text-anchor="middle">5</text>

  <!-- 4 - Coração (Anahata) -->
  <circle cx="320" cy="222" r="22" fill="#00AA44" opacity="0.85" filter="url(#shC)"/>
  <text x="320" y="219" font-family="Arial" font-size="16" fill="white" text-anchor="middle">♡</text>
  <text x="320" y="232" font-family="Arial" font-size="8" fill="white" text-anchor="middle">4</text>

  <!-- 3 - Plexo Solar (Manipura) -->
  <circle cx="320" cy="264" r="18" fill="#FFD700" opacity="0.85" filter="url(#shC)"/>
  <text x="320" y="261" font-family="Arial" font-size="14" fill="#AA7700" text-anchor="middle">☀</text>
  <text x="320" y="273" font-family="Arial" font-size="8" fill="#AA7700" text-anchor="middle">3</text>

  <!-- 2 - Sacral (Svadhisthana) -->
  <circle cx="320" cy="295" r="16" fill="#FF8C00" opacity="0.85" filter="url(#shC)"/>
  <text x="320" y="292" font-family="Arial" font-size="12" fill="white" text-anchor="middle">◎</text>
  <text x="320" y="304" font-family="Arial" font-size="8" fill="white" text-anchor="middle">2</text>

  <!-- 1 - Base/Raiz (Muladhara) -->
  <circle cx="320" cy="322" r="18" fill="#CC2200" opacity="0.85" filter="url(#shC)"/>
  <text x="320" y="319" font-family="Arial" font-size="14" fill="white" text-anchor="middle">▽</text>
  <text x="320" y="331" font-family="Arial" font-size="8" fill="white" text-anchor="middle">1</text>

  <!-- Linha central do corpo (nadi central - Sushumna) -->
  <line x1="320" y1="80" x2="320" y2="340" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- PÊNDULO À DIREITA DO CORPO avaliando chakra do coração -->
  <line x1="420" y1="200" x2="420" y2="222" stroke="#C9A84C" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- Fio inclinado (movimento circular) -->
  <ellipse cx="420" cy="222" rx="22" ry="8" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="420" cy="200" r="8" fill="#C9A84C" opacity="0.7" filter="url(#shC)"/>
  <!-- Mão segurando -->
  <text x="420" y="190" font-family="Arial" font-size="16" fill="#D4A373" text-anchor="middle">✋</text>
  <text x="455" y="218" font-family="Arial" font-size="10" fill="#2D6A4F">Pêndulo</text>
  <text x="455" y="230" font-family="Arial" font-size="10" fill="#2D6A4F">avaliando</text>
  <text x="455" y="242" font-family="Arial" font-size="10" fill="#2D6A4F">Chakra 4</text>

  <!-- TABELA LATERAL DE CHAKRAS -->
  <rect x="510" y="75" width="370" height="500" rx="12" fill="white" opacity="0.45" stroke="#2D6A4F" stroke-width="1.5"/>

  <text x="695" y="100" font-family="Georgia, serif" font-size="14" fill="#2D6A4F" text-anchor="middle" font-weight="bold">TABELA DOS CHAKRAS</text>
  <line x1="520" y1="108" x2="870" y2="108" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- Cabeçalhos -->
  <text x="535" y="123" font-family="Arial" font-size="10" fill="#4A0E8F" font-weight="bold">#</text>
  <text x="555" y="123" font-family="Arial" font-size="10" fill="#4A0E8F" font-weight="bold">Nome</text>
  <text x="660" y="123" font-family="Arial" font-size="10" fill="#4A0E8F" font-weight="bold">Localização</text>
  <text x="765" y="123" font-family="Arial" font-size="10" fill="#4A0E8F" font-weight="bold">Pêndulo: OK</text>
  <line x1="520" y1="128" x2="870" y2="128" stroke="#C9A84C" stroke-width="1"/>

  <!-- Chakra 1 -->
  <circle cx="530" cy="145" r="8" fill="#CC2200" opacity="0.85"/>
  <text x="543" y="149" font-family="Arial" font-size="10" fill="#2D6A4F" font-weight="bold">1 Muladhara</text>
  <text x="660" y="149" font-family="Arial" font-size="9" fill="#2D6A4F">Cóccix / base</text>
  <text x="765" y="149" font-family="Arial" font-size="9" fill="#2D6A4F">Giro horário</text>

  <!-- Chakra 2 -->
  <circle cx="530" cy="168" r="8" fill="#FF8C00" opacity="0.85"/>
  <text x="543" y="172" font-family="Arial" font-size="10" fill="#2D6A4F" font-weight="bold">2 Svadhisthana</text>
  <text x="660" y="172" font-family="Arial" font-size="9" fill="#2D6A4F">Abdome baixo</text>
  <text x="765" y="172" font-family="Arial" font-size="9" fill="#2D6A4F">Giro horário</text>

  <!-- Chakra 3 -->
  <circle cx="530" cy="191" r="8" fill="#FFD700" opacity="0.9"/>
  <text x="543" y="195" font-family="Arial" font-size="10" fill="#2D6A4F" font-weight="bold">3 Manipura</text>
  <text x="660" y="195" font-family="Arial" font-size="9" fill="#2D6A4F">Plexo solar</text>
  <text x="765" y="195" font-family="Arial" font-size="9" fill="#2D6A4F">Giro horário</text>

  <!-- Chakra 4 -->
  <circle cx="530" cy="214" r="8" fill="#00AA44" opacity="0.85"/>
  <text x="543" y="218" font-family="Arial" font-size="10" fill="#2D6A4F" font-weight="bold">4 Anahata</text>
  <text x="660" y="218" font-family="Arial" font-size="9" fill="#2D6A4F">Centro do peito</text>
  <text x="765" y="218" font-family="Arial" font-size="9" fill="#2D6A4F">Giro horário</text>

  <!-- Chakra 5 -->
  <circle cx="530" cy="237" r="8" fill="#1E90FF" opacity="0.85"/>
  <text x="543" y="241" font-family="Arial" font-size="10" fill="#2D6A4F" font-weight="bold">5 Vishuddha</text>
  <text x="660" y="241" font-family="Arial" font-size="9" fill="#2D6A4F">Garganta</text>
  <text x="765" y="241" font-family="Arial" font-size="9" fill="#2D6A4F">Giro horário</text>

  <!-- Chakra 6 -->
  <circle cx="530" cy="260" r="8" fill="#4A0E8F" opacity="0.85"/>
  <text x="543" y="264" font-family="Arial" font-size="10" fill="#2D6A4F" font-weight="bold">6 Ajna</text>
  <text x="660" y="264" font-family="Arial" font-size="9" fill="#2D6A4F">Entre sobrancelhas</text>
  <text x="765" y="264" font-family="Arial" font-size="9" fill="#2D6A4F">Giro horário</text>

  <!-- Chakra 7 -->
  <circle cx="530" cy="283" r="8" fill="#9B59B6" opacity="0.85"/>
  <text x="543" y="287" font-family="Arial" font-size="10" fill="#2D6A4F" font-weight="bold">7 Sahasrara</text>
  <text x="660" y="287" font-family="Arial" font-size="9" fill="#2D6A4F">Topo da cabeça</text>
  <text x="765" y="287" font-family="Arial" font-size="9" fill="#2D6A4F">Giro horário</text>

  <line x1="520" y1="295" x2="870" y2="295" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- Legenda de movimentos -->
  <text x="695" y="315" font-family="Georgia, serif" font-size="13" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Interpretação dos Movimentos</text>

  <rect x="525" y="325" width="155" height="55" rx="8" fill="#2D6A4F" opacity="0.12" stroke="#2D6A4F" stroke-width="1"/>
  <text x="535" y="342" font-family="Arial" font-size="11" fill="#2D6A4F" font-weight="bold">↻ Horário amplo</text>
  <text x="535" y="357" font-family="Arial" font-size="10" fill="#4A0E8F">Chakra ativo</text>
  <text x="535" y="372" font-family="Arial" font-size="10" fill="#4A0E8F">e equilibrado</text>

  <rect x="690" y="325" width="155" height="55" rx="8" fill="#D4A373" opacity="0.2" stroke="#D4A373" stroke-width="1"/>
  <text x="700" y="342" font-family="Arial" font-size="11" fill="#D4A373" font-weight="bold">↺ Anti-horário</text>
  <text x="700" y="357" font-family="Arial" font-size="10" fill="#4A0E8F">Energia</text>
  <text x="700" y="372" font-family="Arial" font-size="10" fill="#4A0E8F">retraída/bloqueada</text>

  <rect x="525" y="392" width="155" height="55" rx="8" fill="#C9A84C" opacity="0.15" stroke="#C9A84C" stroke-width="1"/>
  <text x="535" y="409" font-family="Arial" font-size="11" fill="#C9A84C" font-weight="bold">— Horizontal</text>
  <text x="535" y="424" font-family="Arial" font-size="10" fill="#4A0E8F">Resistência</text>
  <text x="535" y="439" font-family="Arial" font-size="10" fill="#4A0E8F">à limpeza</text>

  <rect x="690" y="392" width="155" height="55" rx="8" fill="#4A0E8F" opacity="0.1" stroke="#4A0E8F" stroke-width="1"/>
  <text x="700" y="409" font-family="Arial" font-size="11" fill="#4A0E8F" font-weight="bold">| Vertical</text>
  <text x="700" y="424" font-family="Arial" font-size="10" fill="#4A0E8F">Chakra em</text>
  <text x="700" y="439" font-family="Arial" font-size="10" fill="#4A0E8F">transição</text>

  <rect x="525" y="460" width="320" height="55" rx="8" fill="#2D6A4F" opacity="0.08" stroke="#2D6A4F" stroke-width="1"/>
  <text x="685" y="477" font-family="Arial" font-size="11" fill="#2D6A4F" text-anchor="middle" font-weight="bold">⊙ Circular pequeno ou parado</text>
  <text x="685" y="492" font-family="Arial" font-size="10" fill="#4A0E8F" text-anchor="middle">Chakra fechado — requer atenção urgente</text>
  <text x="685" y="507" font-family="Arial" font-size="9" fill="#D4A373" text-anchor="middle">⚠ Verificar com outro instrumento antes de concluir</text>

  <!-- Nota rodapé interno -->
  <rect x="520" y="525" width="340" height="38" rx="6" fill="#C9A84C" opacity="0.2"/>
  <text x="690" y="541" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle" font-style="italic">ATENÇÃO: A avaliação de chakras é complementar.</text>
  <text x="690" y="555" font-family="Arial" font-size="9" fill="#2D6A4F" text-anchor="middle" font-style="italic">Não substitui diagnóstico médico ou psicológico.</text>

  <!-- Rodapé -->
  <rect x="0" y="595" width="900" height="25" fill="#2D6A4F" opacity="0.8"/>
  <text x="450" y="611" font-family="Georgia, serif" font-size="10" fill="#F4E9CD" text-anchor="middle">Módulo 2.3 | Radiestesia Terapêutica — Do Iniciante ao Praticante | Rosangela Sousa</text>
</svg>

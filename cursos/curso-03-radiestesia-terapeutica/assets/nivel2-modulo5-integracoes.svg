<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#FDFAF4"/>
      <stop offset="100%" style="stop-color:#F4E9CD"/>
    </radialGradient>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#C9A84C" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D6A4F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="900" height="6" fill="#2D6A4F"/>
  <rect x="0" y="594" width="900" height="6" fill="#2D6A4F"/>

  <!-- Title -->
  <text x="450" y="42" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2D6A4F" text-anchor="middle">Mapa de Integrações — Módulo 2.5</text>
  <text x="450" y="64" font-family="Georgia, serif" font-size="14" fill="#4A5568" text-anchor="middle">Radiestesia Terapêutica como fio condutor das práticas integradas</text>

  <!-- Center circle: Radiesthesia -->
  <circle cx="450" cy="310" r="75" fill="#2D6A4F" filter="url(#softShadow)"/>
  <text x="450" y="302" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#F4E9CD" text-anchor="middle">RADIESTESIA</text>
  <text x="450" y="320" font-family="Georgia, serif" font-size="13" fill="#C9A84C" text-anchor="middle">TERAPÊUTICA</text>
  <text x="450" y="338" font-family="Georgia, serif" font-size="11" fill="#F4E9CD" text-anchor="middle">fio condutor</text>

  <!-- PSICANÁLISE - Top Left -->
  <circle cx="185" cy="180" r="65" fill="#4A0E8F" fill-opacity="0.85" filter="url(#softShadow)"/>
  <text x="185" y="172" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#F4E9CD" text-anchor="middle">PSICANÁLISE</text>
  <text x="185" y="190" font-family="Georgia, serif" font-size="10" fill="#D4A373" text-anchor="middle">inconsciente</text>
  <text x="185" y="205" font-family="Georgia, serif" font-size="10" fill="#D4A373" text-anchor="middle">elaboração</text>
  <!-- Arrow -->
  <line x1="246" y1="214" x2="382" y2="270" stroke="#4A0E8F" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- AROMATERAPIA - Top Right -->
  <circle cx="715" cy="180" r="65" fill="#D4A373" fill-opacity="0.9" filter="url(#softShadow)"/>
  <text x="715" y="168" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D6A4F" text-anchor="middle">AROMATERAPIA</text>
  <text x="715" y="185" font-family="Georgia, serif" font-size="10" fill="#2D6A4F" text-anchor="middle">ressonância</text>
  <text x="715" y="200" font-family="Georgia, serif" font-size="10" fill="#2D6A4F" text-anchor="middle">óleos essenciais</text>
  <!-- Arrow -->
  <line x1="654" y1="214" x2="518" y2="270" stroke="#D4A373" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- CRISTALOTERAPIA - Left -->
  <circle cx="130" cy="370" r="65" fill="#C9A84C" fill-opacity="0.85" filter="url(#softShadow)"/>
  <text x="130" y="358" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D6A4F" text-anchor="middle">CRISTALO-</text>
  <text x="130" y="374" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D6A4F" text-anchor="middle">TERAPIA</text>
  <text x="130" y="392" font-family="Georgia, serif" font-size="10" fill="#2D6A4F" text-anchor="middle">cristais + chakras</text>
  <!-- Arrow -->
  <line x1="195" y1="355" x2="376" y2="318" stroke="#C9A84C" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- FLORAIS - Right -->
  <circle cx="770" cy="370" r="65" fill="#2D6A4F" fill-opacity="0.8" filter="url(#softShadow)"/>
  <text x="770" y="362" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#F4E9CD" text-anchor="middle">FLORAIS</text>
  <text x="770" y="378" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#F4E9CD" text-anchor="middle">DE BACH</text>
  <text x="770" y="396" font-family="Georgia, serif" font-size="10" fill="#C9A84C" text-anchor="middle">38 florais</text>
  <!-- Arrow -->
  <line x1="705" y1="355" x2="524" y2="318" stroke="#2D6A4F" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- PROTOCOLO INTEGRADO - Bottom -->
  <rect x="310" y="450" width="280" height="70" rx="15" ry="15" fill="#2D6A4F" fill-opacity="0.15" stroke="#2D6A4F" stroke-width="2"/>
  <text x="450" y="476" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D6A4F" text-anchor="middle">PROTOCOLO INTEGRADO</text>
  <text x="450" y="495" font-family="Georgia, serif" font-size="11" fill="#4A5568" text-anchor="middle">o mínimo necessário</text>
  <text x="450" y="511" font-family="Georgia, serif" font-size="11" fill="#4A5568" text-anchor="middle">coerência · autoria · ética</text>
  <!-- Arrow from center down -->
  <line x1="450" y1="385" x2="450" y2="447" stroke="#2D6A4F" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Integration labels on arrows -->
  <text x="290" y="248" font-family="Georgia, serif" font-size="10" fill="#4A0E8F" text-anchor="middle" transform="rotate(-25, 290, 248)">identifica / elabora</text>
  <text x="610" y="248" font-family="Georgia, serif" font-size="10" fill="#B87333" text-anchor="middle" transform="rotate(25, 610, 248)">ressonância energética</text>
  <text x="268" y="345" font-family="Georgia, serif" font-size="10" fill="#8B7355" text-anchor="middle" transform="rotate(-15, 268, 345)">seleção e posição</text>
  <text x="628" y="345" font-family="Georgia, serif" font-size="10" fill="#2D6A4F" text-anchor="middle" transform="rotate(15, 628, 345)">estados emocionais</text>

  <!-- Legend -->
  <rect x="25" y="530" width="560" height="50" rx="8" fill="#2D6A4F" fill-opacity="0.07" stroke="#2D6A4F" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="45" y="550" font-family="Georgia, serif" font-size="11" fill="#4A5568">Princípio central:</text>
  <text x="150" y="550" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#2D6A4F">A Radiestesia não é mais uma prática somada — é o instrumento de navegação</text>
  <text x="45" y="568" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#2D6A4F">que orienta a seleção e a sequência de todas as outras práticas em cada sessão.</text>

  <!-- Pendulum icon suggestion -->
  <line x1="840" y1="78" x2="840" y2="540" stroke="#C9A84C" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="840" cy="310" r="18" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  <line x1="840" y1="78" x2="840" y2="292" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  <text x="870" y="180" font-family="Georgia, serif" font-size="10" fill="#C9A84C" text-anchor="middle" transform="rotate(90, 870, 310)">o pêndulo é o fio condutor</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgM3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4E9CD;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
    <marker id="arrowGreen3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D6A4F"/>
    </marker>
  </defs>
  <rect width="900" height="600" fill="url(#bgM3)"/>

  <!-- Título -->
  <rect x="20" y="15" width="860" height="55" rx="10" fill="#D32F2F"/>
  <text x="450" y="38" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="2">MÓDULO 3 — ESTRESSE, TRAUMA E O CÉREBRO</text>
  <text x="450" y="58" font-family="Arial, sans-serif" font-size="11" fill="#FFCCCC" text-anchor="middle">A resposta ao estresse e seus impactos no desenvolvimento • Prof.ª Rosangela Sousa</text>

  <!-- ===== DIAGRAMA EIXO HPA ===== -->
  <rect x="20" y="85" width="420" height="490" rx="12" fill="white" opacity="0.88"/>
  <rect x="20" y="85" width="420" height="38" rx="8" fill="#D32F2F"/>
  <text x="230" y="102" font-family="Georgia, serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">EIXO HPA — RESPOSTA AO ESTRESSE</text>
  <text x="230" y="117" font-family="Arial, sans-serif" font-size="10" fill="#FFCCCC" text-anchor="middle">Hipotálamo → Hipófise → Adrenal</text>

  <!-- AMEAÇA -->
  <rect x="120" y="138" width="220" height="40" rx="20" fill="#F26419"/>
  <text x="230" y="155" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">⚡ AMEAÇA / ESTRESSOR</text>
  <text x="230" y="170" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">real ou percebida</text>

  <!-- Seta para amígdala -->
  <line x1="230" y1="178" x2="230" y2="208" stroke="#D32F2F" stroke-width="3" marker-end="url(#arrowRed)"/>

  <!-- AMÍGDALA -->
  <ellipse cx="230" cy="228" rx="80" ry="30" fill="#D32F2F" opacity="0.85"/>
  <text x="230" y="224" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">AMÍGDALA</text>
  <text x="230" y="238" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Alarme de perigo</text>

  <!-- Seta amígdala -> hipotálamo -->
  <line x1="230" y1="258" x2="230" y2="285" stroke="#D32F2F" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="270" y="275" font-family="Arial, sans-serif" font-size="9" fill="#D32F2F" font-weight="bold">CRH ↑</text>

  <!-- HIPOTÁLAMO -->
  <ellipse cx="230" cy="305" rx="75" ry="28" fill="#F26419" opacity="0.8"/>
  <text x="230" y="301" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">HIPOTÁLAMO</text>
  <text x="230" y="315" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Libera CRH</text>

  <!-- Seta hipotálamo -> hipófise -->
  <line x1="230" y1="333" x2="230" y2="358" stroke="#F26419" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="270" y="350" font-family="Arial, sans-serif" font-size="9" fill="#F26419" font-weight="bold">ACTH ↑</text>

  <!-- HIPÓFISE -->
  <ellipse cx="230" cy="378" rx="70" ry="26" fill="#D4A373" opacity="0.85"/>
  <text x="230" y="374" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">HIPÓFISE</text>
  <text x="230" y="388" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Libera ACTH</text>

  <!-- Seta hipófise -> adrenal -->
  <line x1="230" y1="404" x2="230" y2="428" stroke="#D4A373" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="270" y="420" font-family="Arial, sans-serif" font-size="9" fill="#8B5E3C" font-weight="bold">CORTISOL ↑↑</text>

  <!-- GLÂNDULA ADRENAL -->
  <ellipse cx="230" cy="448" rx="75" ry="28" fill="#8B5E3C" opacity="0.85"/>
  <text x="230" y="444" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">GLÂNDULA ADRENAL</text>
  <text x="230" y="458" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Libera Cortisol + Adrenalina</text>

  <!-- Efeitos do cortisol -->
  <text x="40" y="498" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" font-weight="bold">EFEITOS DO CORTISOL CRÔNICO:</text>
  <text x="40" y="512" font-family="Arial, sans-serif" font-size="10" fill="#555">✗ Prejudica o hipocampo (memória)</text>
  <text x="40" y="525" font-family="Arial, sans-serif" font-size="10" fill="#555">✗ Reduz conexões no córtex pré-frontal</text>
  <text x="40" y="538" font-family="Arial, sans-serif" font-size="10" fill="#555">✗ Hipersensibiliza a amígdala</text>
  <text x="220" y="512" font-family="Arial, sans-serif" font-size="10" fill="#555">✗ Inflama o sistema nervoso</text>
  <text x="220" y="525" font-family="Arial, sans-serif" font-size="10" fill="#555">✗ Bloqueia aprendizagem</text>
  <text x="220" y="538" font-family="Arial, sans-serif" font-size="10" fill="#555">✗ Compromete sistema imune</text>

  <!-- Marcador HPA -->
  <text x="30" y="120" font-family="Arial, sans-serif" font-size="9" fill="#D32F2F" font-style="italic">H = Hipotálamo • P = Hipófise (Pituitary) • A = Adrenal</text>

  <!-- ===== PAINEL DIREITO — LUTAR/FUGIR/CONGELAR + ACEs ===== -->
  <rect x="460" y="85" width="420" height="230" rx="12" fill="white" opacity="0.88"/>
  <rect x="460" y="85" width="420" height="38" rx="8" fill="#F26419"/>
  <text x="670" y="102" font-family="Georgia, serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">3 RESPOSTAS AO PERIGO</text>
  <text x="670" y="117" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Sistema nervoso autônomo — Stephen Porges</text>

  <!-- Lutar -->
  <rect x="473" y="135" width="115" height="90" rx="10" fill="#D32F2F" opacity="0.12" stroke="#D32F2F" stroke-width="2"/>
  <text x="530" y="158" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">🥊</text>
  <text x="530" y="178" font-family="Arial, sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle" font-weight="bold">LUTAR</text>
  <text x="530" y="192" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Agressividade</text>
  <text x="530" y="204" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Gritar, bater, morder</text>
  <text x="530" y="216" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Simpatético ativado</text>

  <!-- Fugir -->
  <rect x="607" y="135" width="115" height="90" rx="10" fill="#F26419" opacity="0.12" stroke="#F26419" stroke-width="2"/>
  <text x="665" y="158" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">🏃</text>
  <text x="665" y="178" font-family="Arial, sans-serif" font-size="12" fill="#F26419" text-anchor="middle" font-weight="bold">FUGIR</text>
  <text x="665" y="192" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Escapar, evitar</text>
  <text x="665" y="204" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Isolamento, fuga</text>
  <text x="665" y="216" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Simpatético ativado</text>

  <!-- Congelar -->
  <rect x="742" y="135" width="125" height="90" rx="10" fill="#9B59B6" opacity="0.12" stroke="#9B59B6" stroke-width="2"/>
  <text x="805" y="158" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">🧊</text>
  <text x="805" y="178" font-family="Arial, sans-serif" font-size="12" fill="#9B59B6" text-anchor="middle" font-weight="bold">CONGELAR</text>
  <text x="805" y="192" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Paralisação, torpor</text>
  <text x="805" y="204" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">"Desligar", dissociar</text>
  <text x="805" y="216" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Parassimpatético dorsal</text>

  <text x="670" y="248" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle" font-style="italic">Na criança: birra, fuga da sala, "apatia" podem ser</text>
  <text x="670" y="262" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" text-anchor="middle" font-weight="bold">respostas de sobrevivência — não é mau comportamento!</text>
  <text x="670" y="278" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">Teoria Polivagal — Stephen Porges (1994)</text>
  <text x="670" y="294" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">Bessel van der Kolk — "O Corpo Guarda as Marcas" (2014)</text>

  <!-- ACEs — Adversidades na infância -->
  <rect x="460" y="330" width="420" height="245" rx="12" fill="white" opacity="0.88"/>
  <rect x="460" y="330" width="420" height="38" rx="8" fill="#2D6A4F"/>
  <text x="670" y="348" font-family="Georgia, serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">ACEs — ADVERSIDADES NA INFÂNCIA</text>
  <text x="670" y="363" font-family="Arial, sans-serif" font-size="10" fill="#E8F5EE" text-anchor="middle">Adverse Childhood Experiences — CDC/Kaiser Permanente Study (1998)</text>

  <!-- Escala ACE -->
  <text x="475" y="392" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" font-weight="bold">TIPOS DE ACEs:</text>

  <!-- 3 colunas de ACEs -->
  <!-- Coluna 1 -->
  <text x="475" y="410" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" font-weight="bold">Abuso:</text>
  <text x="475" y="424" font-family="Arial, sans-serif" font-size="10" fill="#555">• Físico</text>
  <text x="475" y="438" font-family="Arial, sans-serif" font-size="10" fill="#555">• Emocional</text>
  <text x="475" y="452" font-family="Arial, sans-serif" font-size="10" fill="#555">• Sexual</text>

  <!-- Coluna 2 -->
  <text x="580" y="410" font-family="Arial, sans-serif" font-size="10" fill="#F26419" font-weight="bold">Negligência:</text>
  <text x="580" y="424" font-family="Arial, sans-serif" font-size="10" fill="#555">• Física</text>
  <text x="580" y="438" font-family="Arial, sans-serif" font-size="10" fill="#555">• Emocional</text>

  <!-- Coluna 3 -->
  <text x="680" y="410" font-family="Arial, sans-serif" font-size="10" fill="#9B59B6" font-weight="bold">Ambiente familiar:</text>
  <text x="680" y="424" font-family="Arial, sans-serif" font-size="10" fill="#555">• Violência doméstica</text>
  <text x="680" y="438" font-family="Arial, sans-serif" font-size="10" fill="#555">• Pais com transtornos</text>
  <text x="680" y="452" font-family="Arial, sans-serif" font-size="10" fill="#555">• Encarceramento</text>
  <text x="680" y="466" font-family="Arial, sans-serif" font-size="10" fill="#555">• Divórcio conflituoso</text>

  <!-- Impacto ACE score -->
  <rect x="473" y="478" width="395" height="55" rx="8" fill="#D32F2F" opacity="0.1" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="670" y="496" font-family="Arial, sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle" font-weight="bold">IMPACTO POR PONTUAÇÃO ACE:</text>
  <text x="670" y="512" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">ACE ≥ 4: risco 12x maior de depressão • 7x maior de alcoolismo</text>
  <text x="670" y="526" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">ACE ≥ 6: redução de ~20 anos na expectativa de vida (CDC, 1998)</text>

  <text x="670" y="555" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-weight="bold">✓ FATOR PROTETOR: Um adulto seguro e presente pode mitigar todos os efeitos!</text>
</svg>

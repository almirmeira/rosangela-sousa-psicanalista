<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgM4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E9CD;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8F5EE;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#bgM4)"/>

  <!-- Título -->
  <rect x="20" y="15" width="860" height="55" rx="10" fill="#D4A373"/>
  <text x="450" y="38" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="2">MÓDULO 4 — REGULAÇÃO EMOCIONAL E AUTORREGULAÇÃO</text>
  <text x="450" y="58" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">A pirâmide do desenvolvimento emocional saudável • Prof.ª Rosangela Sousa</text>

  <!-- ===== PIRÂMIDE DE REGULAÇÃO ===== -->
  <!-- Base da pirâmide -->
  <!-- Nível 1 (base) - Segurança fisiológica -->
  <polygon points="150,550 750,550 700,480 200,480" fill="#2D6A4F" opacity="0.85"/>
  <text x="450" y="512" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">NÍVEL 1 — SEGURANÇA FISIOLÓGICA</text>
  <text x="450" y="528" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Sono • Alimentação • Movimento • Ambiente previsível</text>
  <text x="450" y="543" font-family="Arial, sans-serif" font-size="10" fill="#E8F5EE" text-anchor="middle" font-style="italic">Base de Maslow + Teoria Polivagal de Porges</text>

  <!-- Nível 2 - Apego seguro -->
  <polygon points="200,478 700,478 660,408 240,408" fill="#2E86AB" opacity="0.85"/>
  <text x="450" y="438" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">NÍVEL 2 — APEGO SEGURO</text>
  <text x="450" y="454" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Vínculo confiável • Co-regulação do adulto • Presença responsiva</text>
  <text x="450" y="469" font-family="Arial, sans-serif" font-size="10" fill="#E3F2F8" text-anchor="middle" font-style="italic">Mary Ainsworth (1970) • John Bowlby (1969)</text>

  <!-- Nível 3 - Co-regulação -->
  <polygon points="240,406 660,406 625,336 275,336" fill="#F26419" opacity="0.82"/>
  <text x="450" y="365" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">NÍVEL 3 — CO-REGULAÇÃO</text>
  <text x="450" y="381" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Adulto regula junto com a criança • Nomeação de emoções</text>
  <text x="450" y="397" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-style="italic">Dan Siegel — "Name it to tame it"</text>

  <!-- Nível 4 - Habilidades de regulação -->
  <polygon points="275,334 625,334 595,264 305,264" fill="#D4A373" opacity="0.88"/>
  <text x="450" y="293" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">NÍVEL 4 — HABILIDADES DE REGULAÇÃO</text>
  <text x="450" y="308" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Respiração • Mindfulness • Técnicas corporais</text>
  <text x="450" y="322" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-style="italic">Kabat-Zinn • Siegel • van der Kolk</text>

  <!-- Nível 5 - Autorregulação -->
  <polygon points="305,262 595,262 565,192 335,192" fill="#9B59B6" opacity="0.82"/>
  <text x="450" y="221" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">NÍVEL 5 — AUTORREGULAÇÃO</text>
  <text x="450" y="236" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Controle de impulsos • Tolerar frustração • Adiar gratificação</text>
  <text x="450" y="250" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-style="italic">Walter Mischel — Marshmallow Test (Stanford)</text>

  <!-- Topo - Função Executiva -->
  <polygon points="335,190 565,190 450,120" fill="#2D6A4F" opacity="0.9"/>
  <text x="450" y="158" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">FUNÇÃO</text>
  <text x="450" y="172" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">EXECUTIVA</text>

  <!-- Seta da base ao topo -->
  <text x="100" y="345" font-family="Arial, sans-serif" font-size="11" fill="#2D6A4F" text-anchor="middle" font-weight="bold" transform="rotate(-90,100,345)">CONSTRUÇÃO PROGRESSIVA ↑</text>

  <!-- ===== PAINEL DIREITO — Técnicas ===== -->
  <!-- Painel Técnicas de Regulação -->
  <rect x="760" y="90" width="125" height="480" rx="10" fill="white" opacity="0.85"/>
  <rect x="760" y="90" width="125" height="35" rx="8" fill="#2D6A4F"/>
  <text x="822" y="103" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">TÉCNICAS</text>
  <text x="822" y="116" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">POR NÍVEL</text>

  <text x="770" y="142" font-family="Arial, sans-serif" font-size="9" fill="#2D6A4F" font-weight="bold">NÍVEL 1:</text>
  <text x="770" y="155" font-family="Arial, sans-serif" font-size="9" fill="#333">Rotina de sono</text>
  <text x="770" y="167" font-family="Arial, sans-serif" font-size="9" fill="#333">Snack saudável</text>
  <text x="770" y="179" font-family="Arial, sans-serif" font-size="9" fill="#333">Cantos calmos</text>

  <text x="770" y="200" font-family="Arial, sans-serif" font-size="9" fill="#2E86AB" font-weight="bold">NÍVEL 2:</text>
  <text x="770" y="213" font-family="Arial, sans-serif" font-size="9" fill="#333">Presença ativa</text>
  <text x="770" y="225" font-family="Arial, sans-serif" font-size="9" fill="#333">Olho no olho</text>
  <text x="770" y="237" font-family="Arial, sans-serif" font-size="9" fill="#333">Tom de voz calmo</text>

  <text x="770" y="258" font-family="Arial, sans-serif" font-size="9" fill="#F26419" font-weight="bold">NÍVEL 3:</text>
  <text x="770" y="271" font-family="Arial, sans-serif" font-size="9" fill="#333">Nomear emoções</text>
  <text x="770" y="283" font-family="Arial, sans-serif" font-size="9" fill="#333">Valide o sentir</text>
  <text x="770" y="295" font-family="Arial, sans-serif" font-size="9" fill="#333">Histórias emocionais</text>

  <text x="770" y="316" font-family="Arial, sans-serif" font-size="9" fill="#8B5E3C" font-weight="bold">NÍVEL 4:</text>
  <text x="770" y="329" font-family="Arial, sans-serif" font-size="9" fill="#333">Respiração 4-7-8</text>
  <text x="770" y="341" font-family="Arial, sans-serif" font-size="9" fill="#333">Body scan</text>
  <text x="770" y="353" font-family="Arial, sans-serif" font-size="9" fill="#333">Grounding 5-4-3-2-1</text>

  <text x="770" y="374" font-family="Arial, sans-serif" font-size="9" fill="#9B59B6" font-weight="bold">NÍVEL 5:</text>
  <text x="770" y="387" font-family="Arial, sans-serif" font-size="9" fill="#333">Escolha postergada</text>
  <text x="770" y="399" font-family="Arial, sans-serif" font-size="9" fill="#333">Contagem regressiva</text>
  <text x="770" y="411" font-family="Arial, sans-serif" font-size="9" fill="#333">STOP method</text>

  <!-- Fato chave -->
  <rect x="30" y="90" width="115" height="130" rx="10" fill="white" opacity="0.85"/>
  <text x="87" y="108" font-family="Arial, sans-serif" font-size="9" fill="#2D6A4F" text-anchor="middle" font-weight="bold">FATO CHAVE</text>
  <text x="87" y="125" font-family="Arial, sans-serif" font-size="25" text-anchor="middle">🧠</text>
  <text x="87" y="148" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">Autorregulação</text>
  <text x="87" y="160" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">é mais preditiva</text>
  <text x="87" y="172" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">de sucesso que</text>
  <text x="87" y="184" font-family="Arial, sans-serif" font-size="9" fill="#D32F2F" text-anchor="middle" font-weight="bold">QI ou QA</text>
  <text x="87" y="198" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle" font-style="italic">Mischel, 1990</text>
  <text x="87" y="210" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle" font-style="italic">Goleman, 1995</text>

  <!-- Rodapé citação -->
  <rect x="20" y="570" width="860" height="25" rx="5" fill="#D4A373" opacity="0.4"/>
  <text x="450" y="585" font-family="Arial, sans-serif" font-size="10" fill="#5A3A00" text-anchor="middle" font-style="italic">"A autorregulação emocional é a habilidade que está por baixo de todas as outras habilidades da vida." — Dan Siegel</text>
</svg>

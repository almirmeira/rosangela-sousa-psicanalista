<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <radialGradient id="bg04" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#F4E9CD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede0c0;stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg04)"/>

  <!-- Título -->
  <text x="450" y="38" font-family="Georgia, serif" font-size="20" fill="#1B3A4B" text-anchor="middle" font-weight="bold">NEUROPLASTICIDADE E O PROCESSO TERAPÊUTICO</text>
  <text x="450" y="58" font-family="Arial, sans-serif" font-size="12" fill="#2D6A4F" text-anchor="middle">Módulo 4 — O que a terapia faz com o cérebro</text>
  <line x1="150" y1="68" x2="750" y2="68" stroke="#2D6A4F" stroke-width="1.5"/>

  <!-- Subtítulo esquerdo -->
  <text x="205" y="105" font-family="Arial, sans-serif" font-size="13" fill="#1B3A4B" text-anchor="middle" font-weight="bold">ANTES DA TERAPIA</text>
  <!-- Subtítulo direito -->
  <text x="695" y="105" font-family="Arial, sans-serif" font-size="13" fill="#2D6A4F" text-anchor="middle" font-weight="bold">APÓS A TERAPIA</text>

  <!-- Seta central de transformação -->
  <rect x="370" y="270" width="160" height="60" rx="10" fill="#C9A84C" opacity="0.2" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="450" y="292" font-family="Georgia, serif" font-size="11" fill="#8B5E2F" text-anchor="middle" font-weight="bold">PROCESSO</text>
  <text x="450" y="307" font-family="Georgia, serif" font-size="11" fill="#8B5E2F" text-anchor="middle" font-weight="bold">TERAPÊUTICO</text>
  <text x="450" y="322" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Integração · Mudança</text>
  <!-- Setas -->
  <line x1="360" y1="300" x2="290" y2="300" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="300" x2="610" y2="300" stroke="#C9A84C" stroke-width="2"/>
  <polygon points="608,293 620,300 608,307" fill="#C9A84C"/>

  <!-- Cérebro ANTES (esquerda) - estado traumático/padrão antigo -->
  <g transform="translate(205, 310)">
    <!-- Silhueta do cérebro simplificada -->
    <ellipse cx="0" cy="-80" rx="80" ry="60" fill="#D4A373" opacity="0.3" stroke="#D4A373" stroke-width="2"/>
    <ellipse cx="35" cy="-50" rx="45" ry="35" fill="#D4A373" opacity="0.2" stroke="#D4A373" stroke-width="1"/>
    <!-- Conexões neurais rígidas/limitadas -->
    <line x1="-40" y1="-100" x2="-10" y2="-70" stroke="#8B0000" stroke-width="2" opacity="0.6"/>
    <line x1="-10" y1="-70" x2="20" y2="-90" stroke="#8B0000" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="-90" x2="40" y2="-60" stroke="#8B0000" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="-60" x2="-10" y2="-70" stroke="#8B0000" stroke-width="1.5" opacity="0.5"/>
    <!-- Nós -->
    <circle cx="-40" cy="-100" r="5" fill="#8B0000" opacity="0.7"/>
    <circle cx="-10" cy="-70" r="5" fill="#8B0000" opacity="0.7"/>
    <circle cx="20" cy="-90" r="5" fill="#8B0000" opacity="0.7"/>
    <circle cx="40" cy="-60" r="5" fill="#8B0000" opacity="0.7"/>
    <circle cx="-30" cy="-60" r="5" fill="#8B0000" opacity="0.7"/>
    <!-- Rótulos -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#8B0000" text-anchor="middle" font-weight="bold">Padrões rígidos</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Trauma não integrado</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Amígdala hiperativa</text>
    <text x="0" y="41" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Poucas conexões novas</text>
  </g>

  <!-- Cérebro APÓS (direita) - estado pós-terapia -->
  <g transform="translate(695, 310)">
    <!-- Silhueta do cérebro -->
    <ellipse cx="0" cy="-80" rx="80" ry="60" fill="#2D6A4F" opacity="0.2" stroke="#2D6A4F" stroke-width="2"/>
    <ellipse cx="35" cy="-50" rx="45" ry="35" fill="#2D6A4F" opacity="0.15" stroke="#2D6A4F" stroke-width="1"/>
    <!-- Conexões neurais ricas/variadas -->
    <line x1="-40" y1="-100" x2="-10" y2="-70" stroke="#2D6A4F" stroke-width="2" opacity="0.8"/>
    <line x1="-10" y1="-70" x2="20" y2="-90" stroke="#2D6A4F" stroke-width="2" opacity="0.8"/>
    <line x1="20" y1="-90" x2="40" y2="-60" stroke="#2D6A4F" stroke-width="2" opacity="0.8"/>
    <line x1="-30" y1="-60" x2="-10" y2="-70" stroke="#6B2D8B" stroke-width="1.5" opacity="0.7"/>
    <line x1="-40" y1="-100" x2="20" y2="-90" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
    <line x1="-10" y1="-70" x2="40" y2="-60" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
    <line x1="-30" y1="-60" x2="20" y2="-90" stroke="#2D6A4F" stroke-width="1" opacity="0.5"/>
    <line x1="-40" y1="-100" x2="40" y2="-60" stroke="#6B2D8B" stroke-width="1" opacity="0.4"/>
    <!-- Nós maiores e mais vibrantes -->
    <circle cx="-40" cy="-100" r="7" fill="#2D6A4F" opacity="0.9"/>
    <circle cx="-10" cy="-70" r="7" fill="#6B2D8B" opacity="0.9"/>
    <circle cx="20" cy="-90" r="7" fill="#C9A84C" opacity="0.9"/>
    <circle cx="40" cy="-60" r="7" fill="#2D6A4F" opacity="0.9"/>
    <circle cx="-30" cy="-60" r="6" fill="#C9A84C" opacity="0.8"/>
    <!-- Rótulos -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-weight="bold">Padrões flexíveis</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Trauma integrado</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Córtex pré-frontal ativo</text>
    <text x="0" y="41" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Novas conexões ricas</text>
  </g>

  <!-- Mecanismos terapêuticos abaixo -->
  <text x="450" y="435" font-family="Georgia, serif" font-size="13" fill="#1B3A4B" text-anchor="middle" font-weight="bold">MECANISMOS DE NEUROPLASTICIDADE NA TERAPIA</text>
  <line x1="200" y1="443" x2="700" y2="443" stroke="#D4A373" stroke-width="1"/>

  <!-- 4 mecanismos -->
  <!-- M1 -->
  <rect x="95" y="450" width="155" height="80" rx="6" fill="#2D6A4F" opacity="0.1" stroke="#2D6A4F" stroke-width="1"/>
  <text x="172" y="468" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-weight="bold">SINAPTOGÊNESE</text>
  <text x="172" y="483" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Novas conexões</text>
  <text x="172" y="496" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">entre neurônios</text>
  <text x="172" y="518" font-family="Arial, sans-serif" font-size="8" fill="#6B2D8B" text-anchor="middle" font-style="italic">Relação terapêutica</text>

  <!-- M2 -->
  <rect x="265" y="450" width="155" height="80" rx="6" fill="#6B2D8B" opacity="0.1" stroke="#6B2D8B" stroke-width="1"/>
  <text x="342" y="468" font-family="Arial, sans-serif" font-size="10" fill="#6B2D8B" text-anchor="middle" font-weight="bold">RECONSOLIDAÇÃO</text>
  <text x="342" y="483" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Reescrita de memórias</text>
  <text x="342" y="496" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">traumáticas</text>
  <text x="342" y="518" font-family="Arial, sans-serif" font-size="8" fill="#6B2D8B" text-anchor="middle" font-style="italic">Insight + elaboração</text>

  <!-- M3 -->
  <rect x="435" y="450" width="155" height="80" rx="6" fill="#C9A84C" opacity="0.15" stroke="#C9A84C" stroke-width="1"/>
  <text x="512" y="468" font-family="Arial, sans-serif" font-size="10" fill="#8B5E2F" text-anchor="middle" font-weight="bold">REGULAÇÃO</text>
  <text x="512" y="483" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Amígdala ↓</text>
  <text x="512" y="496" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Córtex pré-frontal ↑</text>
  <text x="512" y="518" font-family="Arial, sans-serif" font-size="8" fill="#6B2D8B" text-anchor="middle" font-style="italic">Mindfulness + somática</text>

  <!-- M4 -->
  <rect x="605" y="450" width="155" height="80" rx="6" fill="#D4A373" opacity="0.2" stroke="#D4A373" stroke-width="1"/>
  <text x="682" y="468" font-family="Arial, sans-serif" font-size="10" fill="#8B5E2F" text-anchor="middle" font-weight="bold">INTEGRAÇÃO</text>
  <text x="682" y="483" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">Hemisférios esquerdo</text>
  <text x="682" y="496" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">e direito em harmonia</text>
  <text x="682" y="518" font-family="Arial, sans-serif" font-size="8" fill="#6B2D8B" text-anchor="middle" font-style="italic">Narrativa + corporalidade</text>

  <!-- Rodapé -->
  <line x1="85" y1="550" x2="815" y2="550" stroke="#D4A373" stroke-width="1" opacity="0.5"/>
  <text x="450" y="568" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B" text-anchor="middle" opacity="0.7">Formação em Terapia Holística Integrativa — Rosangela Sousa | Módulo 4</text>
</svg>

  <text x="717" y="518" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">✓ Precificação honesta</text>
  <text x="717" y="532" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">✓ Depoimentos éticos</text>
  <text x="717" y="546" font-family="Arial, sans-serif" font-size="9" fill="#1B3A4B" text-anchor="middle">✓ Clareza sobre formação</text>
  <line x1="625" y1="470" x2="520" y2="338" stroke="#2D6A4F" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <radialGradient id="bg07" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#F4E9CD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede0c0;stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg07)"/>

  <!-- Título -->
  <text x="450" y="38" font-family="Georgia, serif" font-size="20" fill="#1B3A4B" text-anchor="middle" font-weight="bold">FLUXO DO ESTÁGIO SUPERVISIONADO</text>
  <text x="450" y="58" font-family="Arial, sans-serif" font-size="12" fill="#2D6A4F" text-anchor="middle">Módulo 7 — Da Formação à Prática Profissional</text>
  <line x1="150" y1="68" x2="750" y2="68" stroke="#2D6A4F" stroke-width="1.5"/>

  <!-- Espiral / Arco ascendente do estágio -->
  <!-- Etapa 1: Preparação -->
  <g transform="translate(100, 200)">
    <circle cx="0" cy="0" r="65" fill="#D4A373" opacity="0.2" stroke="#D4A373" stroke-width="2"/>
    <circle cx="0" cy="0" r="52" fill="#D4A373" opacity="0.15"/>
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#8B5E2F" text-anchor="middle" font-weight="bold">ETAPA 1</text>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="12" fill="#8B5E2F" text-anchor="middle" font-weight="bold">PREPARAÇÃO</text>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Seleção de clientes</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Termo de consentimento</text>
    <text x="0" y="38" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Espaço terapêutico</text>
    <!-- Número da etapa -->
    <circle cx="-50" cy="-50" r="15" fill="#D4A373"/>
    <text x="-50" y="-44" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">1</text>
  </g>

  <!-- Seta 1->2 -->
  <path d="M 175 210 Q 235 160 270 220" fill="none" stroke="#C9A84C" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="268,213 278,225 265,228" fill="#C9A84C"/>

  <!-- Etapa 2: Primeira Sessão -->
  <g transform="translate(290, 280)">
    <circle cx="0" cy="0" r="65" fill="#C9A84C" opacity="0.2" stroke="#C9A84C" stroke-width="2"/>
    <circle cx="0" cy="0" r="52" fill="#C9A84C" opacity="0.15"/>
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#8B5E2F" text-anchor="middle" font-weight="bold">ETAPA 2</text>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="11" fill="#8B5E2F" text-anchor="middle" font-weight="bold">1ª SESSÃO</text>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Anamnese completa</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Contrato terapêutico</text>
    <text x="0" y="38" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Rapport e acolhimento</text>
    <circle cx="-50" cy="-50" r="15" fill="#C9A84C"/>
    <text x="-50" y="-44" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">2</text>
  </g>

  <!-- Seta 2->3 -->
  <path d="M 365 265 Q 415 210 450 255" fill="none" stroke="#2D6A4F" stroke-width="2"/>
  <polygon points="448,248 460,260 447,265" fill="#2D6A4F"/>

  <!-- Etapa 3: Sessões 2-4 -->
  <g transform="translate(470, 210)">
    <circle cx="0" cy="0" r="65" fill="#2D6A4F" opacity="0.15" stroke="#2D6A4F" stroke-width="2"/>
    <circle cx="0" cy="0" r="52" fill="#2D6A4F" opacity="0.1"/>
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-weight="bold">ETAPA 3</text>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="11" fill="#2D6A4F" text-anchor="middle" font-weight="bold">SESSÕES 2-4</text>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Prática integrativa</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Técnicas holísticas</text>
    <text x="0" y="38" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Relatórios de sessão</text>
    <circle cx="-50" cy="-50" r="15" fill="#2D6A4F"/>
    <text x="-50" y="-44" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">3</text>
  </g>

  <!-- Seta 3->4 -->
  <path d="M 545 200 Q 590 160 630 195" fill="none" stroke="#6B2D8B" stroke-width="2"/>
  <polygon points="628,188 640,200 627,204" fill="#6B2D8B"/>

  <!-- Etapa 4: Supervisão Individual -->
  <g transform="translate(650, 200)">
    <circle cx="0" cy="0" r="65" fill="#6B2D8B" opacity="0.15" stroke="#6B2D8B" stroke-width="2"/>
    <circle cx="0" cy="0" r="52" fill="#6B2D8B" opacity="0.1"/>
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#6B2D8B" text-anchor="middle" font-weight="bold">ETAPA 4</text>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="11" fill="#6B2D8B" text-anchor="middle" font-weight="bold">SUPERVISÃO</text>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">2 sessões individuais</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">com Rosangela</text>
    <text x="0" y="38" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">30 min cada</text>
    <circle cx="-50" cy="-50" r="15" fill="#6B2D8B"/>
    <text x="-50" y="-44" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">4</text>
  </g>

  <!-- Seta 4->5 (desce) -->
  <path d="M 650 265 Q 620 340 580 380" fill="none" stroke="#1B3A4B" stroke-width="2"/>
  <polygon points="572,378 585,390 590,378" fill="#1B3A4B"/>

  <!-- Etapa 5: 5ª Sessão e Protocolo -->
  <g transform="translate(470, 430)">
    <circle cx="0" cy="0" r="65" fill="#1B3A4B" opacity="0.12" stroke="#1B3A4B" stroke-width="2"/>
    <circle cx="0" cy="0" r="52" fill="#1B3A4B" opacity="0.08"/>
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B" text-anchor="middle" font-weight="bold">ETAPA 5</text>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="11" fill="#1B3A4B" text-anchor="middle" font-weight="bold">5ª SESSÃO</text>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Encerramento ético</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Avaliação do processo</text>
    <text x="0" y="38" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Protocolo autoral</text>
    <circle cx="-50" cy="-50" r="15" fill="#1B3A4B"/>
    <text x="-50" y="-44" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">5</text>
  </g>

  <!-- Seta 5->6 -->
  <path d="M 395 435 Q 350 420 310 445" fill="none" stroke="#C9A84C" stroke-width="2"/>
  <polygon points="304,438 308,452 320,446" fill="#C9A84C"/>

  <!-- Etapa 6: FORMATURA -->
  <g transform="translate(230, 440)">
    <circle cx="0" cy="0" r="70" fill="#C9A84C" opacity="0.25" stroke="#C9A84C" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="56" fill="#C9A84C" opacity="0.2"/>
    <text x="0" y="-22" font-family="Arial, sans-serif" font-size="10" fill="#8B5E2F" text-anchor="middle" font-weight="bold">ETAPA 6</text>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="13" fill="#8B5E2F" text-anchor="middle" font-weight="bold">FORMATURA</text>
    <text x="0" y="13" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Apresentação do protocolo</text>
    <text x="0" y="26" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Cerimônia de conclusão</text>
    <text x="0" y="39" font-family="Arial, sans-serif" font-size="8" fill="#1B3A4B" text-anchor="middle">Certificado ABRATH</text>
    <circle cx="-55" cy="-55" r="17" fill="#C9A84C" stroke="#8B5E2F" stroke-width="1"/>
    <text x="-55" y="-49" font-family="Georgia, serif" font-size="15" fill="white" text-anchor="middle" font-weight="bold">★</text>
  </g>

  <!-- Rodapé -->
  <line x1="85" y1="535" x2="815" y2="535" stroke="#D4A373" stroke-width="1" opacity="0.5"/>
  <text x="450" y="553" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B" text-anchor="middle">O estágio é o momento em que o terapeuta em formação encontra sua própria voz clínica.</text>
  <text x="450" y="570" font-family="Arial, sans-serif" font-size="10" fill="#1B3A4B" text-anchor="middle" opacity="0.7">Formação em Terapia Holística Integrativa — Rosangela Sousa | Módulo 7</text>
</svg>
